name: 'Apply CoreShift Patches'
description: 'Applies Root Managers, Tweaks, and Device Fixes'

inputs:
  root_variant:
    required: true
  hook_method:
    required: true
  kernel_version:
    required: true
  apply_device_fixes:
    default: 'No'
  apply_cpu_scheduler_patches:
    default: 'No'
  apply_fs_patches:
    default: 'No'
  apply_memory_patches:
    default: 'No'
  apply_network_patches:
    default: 'No'
  apply_power_management_patches:
    default: 'No'
  apply_misc_patches:
    default: 'No'
  apply_other_patches:
    default: 'No'
  apply_zram_enhance:
    default: 'No'
  apply_bbg:
    default: 'No'
  apply_vtomsonek:
    default: 'No'
  apply_hakan:
    default: 'No'
  apply_kvm:
    default: 'No'
  performance_patch:
    default: 'Universal'

runs:
  using: 'composite'
  steps:

    # =========================
    # ROOT VARIANT (SUBMODULE BASED)
    # =========================
    - name: Apply Root Variant
      shell: bash
      working-directory: ${{ env.SRC_DIR }}
      run: |
        set -euo pipefail

        VERSION="${{ inputs.kernel_version }}"
        ROOT_VARIANT="${{ inputs.root_variant }}"
        HOOK_METHOD="${{ inputs.hook_method }}"
        BASE="$GITHUB_WORKSPACE/manager"

        DEFCONFIG="arch/arm64/configs/gki_defconfig"
        [ -f arch/arm64/configs/rosemary_defconfig ] && DEFCONFIG="arch/arm64/configs/rosemary_defconfig"
        [ -f arch/arm64/configs/gale_defconfig ] && DEFCONFIG="arch/arm64/configs/gale_defconfig"

        # ---- clean previous
        rm -rf drivers/staging/kernelsu drivers/kernelsu KernelSU KernelSU-Next 2>/dev/null || true

        # ---- resolver (version-aware, no hardcode)
        resolve_manager() {
          local name="$1"

          if [ -d "$BASE/${name}-${VERSION}" ]; then
            echo "$BASE/${name}-${VERSION}"
            return
          fi

          if [ -d "$BASE/${name}" ]; then
            echo "$BASE/${name}"
            return
          fi

          echo ""
        }

        install_manager() {
          local path="$1"
          local arg="$2"

          if [ -z "$path" ]; then
            echo "Error: Manager path is empty. Silent manager failure prevented."
            exit 1
          fi

          if [ -f "$path/kernel/setup.sh" ]; then
            bash "$path/kernel/setup.sh" "$arg"
            if [ $? -ne 0 ]; then
              echo "Error: setup.sh failed for manager $path with arg $arg"
              exit 1
            fi
          else
            echo "Error: setup.sh not found in manager path $path"
            exit 1
          fi
        }

        apply_patch() {
          local patch_file="$1"
          local target_dir="${2:-.}"
          echo "Applying patch: $patch_file in $target_dir"
          (cd "$target_dir" && patch -p1 --forward < "$patch_file" || { echo "Error: Patch failed: $patch_file"; exit 1; })
          if find "$target_dir" -name "*.rej" | grep -q .; then
            echo "Error: Reject files found after applying $patch_file"
            exit 1
          fi
        }

        # =========================
        # ROOT SELECTION
        # =========================
        case "$ROOT_VARIANT" in
          KernelSU)
            MGR=$(resolve_manager "KernelSU")
            if [ "$VERSION" = "4.19" ]; then
              install_manager "$MGR" "susfs-rksu-master"
            else
              install_manager "$MGR" "main"
            fi
            ;;

          KernelSU-Next)
            MGR=$(resolve_manager "KernelSU-Next")
            if [ "$VERSION" = "4.19" ]; then
              install_manager "$MGR" "legacy"
            else
              install_manager "$MGR" "dev-susfs"
            fi
            ;;

          "KernelSU-Next (All Managers)")
            MGR=$(resolve_manager "KernelSU-Next")
            install_manager "$MGR" "dev-susfs"
            apply_patch "$GITHUB_WORKSPACE/.github/patches/ksun-add-more-managers-support.patch" "KernelSU-Next"
            ;;

          "Rissu (MamboSU)")
            MGR=$(resolve_manager "Rissu")
            install_manager "$MGR" "susfs-mambo-master"
            ;;

          ResukiSU)
            MGR=$(resolve_manager "ResukiSU")
            install_manager "$MGR" "main"
            ;;

          "Wild KSU")
            MGR=$(resolve_manager "Wild_KSU")
            install_manager "$MGR" "wild"
            ;;
        esac

        # =========================
        # BASIC KSU FIX
        # =========================
        if [ "$ROOT_VARIANT" != "Vanilla" ]; then
          sed -i 's/$(error KSU requires Kprobes; enable it (defconfig))/# disabled/' drivers/kernelsu/Kbuild
        fi

        # =========================
        # DEFCONFIG BASE (NO HOOKS YET)
        # =========================
        if [ "$ROOT_VARIANT" != "Vanilla" ]; then
          sed -i '/CONFIG_KSU=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KPM=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KPROBES=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KPROBE_EVENTS=/d' "$DEFCONFIG"
          sed -i '/CONFIG_OVERLAY_FS=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_SYSCALL_HOOK=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_SUSFS_SUS_SU=/d' "$DEFCONFIG"

          cat >> "$DEFCONFIG" <<EOF
        CONFIG_KSU=y
        CONFIG_KPM=y
        CONFIG_KPROBES=y
        CONFIG_KPROBE_EVENTS=y
        CONFIG_OVERLAY_FS=y
        CONFIG_KSU_SYSCALL_HOOK=n
        CONFIG_KSU_SUSFS_SUS_SU=n
        EOF
        fi

        # =========================
        # VERSION EXTRACTION (STABLE)
        # =========================
        if [ -d "KernelSU-Next" ]; then
          cd KernelSU-Next
          TAG=$(git describe --tags --always | sed 's/^v//')
          OFFSET=$(grep -oP 'expr \K[0-9]+' kernel/Kbuild | head -n1 || echo 10200)
          COUNT=$(git rev-list --count HEAD)
          VERSION_CODE=$((COUNT + OFFSET))
          cd ..

          sed -i "s|KSU_VERSION_FALLBACK :=.*|KSU_VERSION_FALLBACK := ${VERSION_CODE}|" drivers/kernelsu/Kbuild
          sed -i "s|KSU_VERSION_TAG_FALLBACK :=.*|KSU_VERSION_TAG_FALLBACK := ${TAG}|" drivers/kernelsu/Kbuild
          sed -i "s|ccflags-y += -DKSU_VERSION=.*|ccflags-y += -DKSU_VERSION=${VERSION_CODE}|" drivers/kernelsu/Kbuild

        elif [ -d "KernelSU" ]; then
          cd KernelSU
          TAG=$(git describe --tags --always | sed 's/^v//')
          OFFSET=$(grep -oP 'expr \K[0-9]+' kernel/Kbuild | head -n1 || echo 10200)
          COUNT=$(git rev-list --count HEAD)
          VERSION_CODE=$((COUNT + OFFSET))
          cd ..

          sed -i "s|KSU_VERSION_FALLBACK :=.*|KSU_VERSION_FALLBACK := ${VERSION_CODE}|" drivers/kernelsu/Kbuild
          sed -i "s|KSU_VERSION_TAG_FALLBACK :=.*|KSU_VERSION_TAG_FALLBACK := ${TAG}|" drivers/kernelsu/Kbuild
          sed -i "s|ccflags-y += -DKSU_VERSION=.*|ccflags-y += -DKSU_VERSION=${VERSION_CODE}|" drivers/kernelsu/Kbuild
        fi

        # =========================
        # HOOKS (SUSFS)
        # =========================
        if [ "$HOOK_METHOD" = "susfs" ] || [ "$ROOT_VARIANT" = "ResukiSU" ]; then

          PATCH_ROOT="$GITHUB_WORKSPACE/.github/patches"

          case "$VERSION" in
            4.19)
              if [[ "$DEFCONFIG" == *"gale"* ]]; then
                apply_patch "$PATCH_ROOT/susfs4ksu/4.19/gale/susfs_gale.patch"
              fi
              ;;

            5.10) SUS_DIR="gki-android12-5.10" ;;
            6.1)  SUS_DIR="gki-android14-6.1" ;;
            6.6)  SUS_DIR="gki-android15-6.6" ;;
          esac

          if [ "$VERSION" != "4.19" ]; then
            SUS_BASE="$PATCH_ROOT/susfs4ksu/$SUS_DIR"

            if [ -d "$SUS_BASE" ]; then
              cp -r "$SUS_BASE/fs" . 2>/dev/null || true
              cp -r "$SUS_BASE/include" . 2>/dev/null || true

              if ls "$SUS_BASE"/50_add_susfs_*.patch 1> /dev/null 2>&1; then
                for p in "$SUS_BASE"/50_add_susfs_*.patch; do
                  apply_patch "$p"
                done
              fi

              find "$SUS_BASE" -type f -name "*.patch" ! -name "50_add_susfs_*.patch" | sort -V | while IFS= read -r p; do
                apply_patch "$p"
              done
            fi
          fi
        fi

        # =========================
        # DEFCONFIG (SUSFS FLAGS)
        # =========================
        if [ "$HOOK_METHOD" = "susfs" ] || [ "$ROOT_VARIANT" = "ResukiSU" ]; then
          sed -i '/CONFIG_KSU_SUSFS=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_SUSFS_SUS_PATH=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_SUSFS_SUS_MOUNT=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_SUSFS_SUS_KSTAT_SPOOF_GENERIC=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_SUSFS_SUS_KSTAT=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSTAT=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_SUSFS_SUS_OVERLAYFS=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_SUSFS_TRY_UMOUNT=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_SUSFS_SPOOF_UNAME=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_SUSFS_ENABLE_LOG=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_SUSFS_OPEN_REDIRECT=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_MANUAL_HOOK=/d' "$DEFCONFIG"
          sed -i '/CONFIG_KSU_HAS_MANUAL_HOOK=/d' "$DEFCONFIG"

          cat >> "$DEFCONFIG" <<EOF
        CONFIG_KSU_SUSFS=y
        CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_PATH=y
        CONFIG_KSU_SUSFS_SUS_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_KSTAT_SPOOF_GENERIC=y
        CONFIG_KSU_SUSFS_SUS_KSTAT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSTAT=y
        CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n
        CONFIG_KSU_SUSFS_TRY_UMOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
        CONFIG_KSU_SUSFS_SPOOF_UNAME=y
        CONFIG_KSU_SUSFS_ENABLE_LOG=y
        CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
        CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
        CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
        CONFIG_KSU_MANUAL_HOOK=n
        CONFIG_KSU_HAS_MANUAL_HOOK=n
        EOF
        fi

        # =========================
        # BUILD FIX (KSU NEXT / KSU)
        # =========================
        case "$ROOT_VARIANT" in
          KernelSU|KernelSU-Next|"KernelSU-Next (All Managers)")
            apply_patch "$GITHUB_WORKSPACE/.github/patches/ksu_susfs_spoof_uname.patch"
            ;;
        esac

    - name: Apply BBG
      if: inputs.apply_bbg == 'Yes'
      uses: ./.github/actions/bbg

    - name: Apply KVM Patch
      if: inputs.apply_kvm == 'Yes'
      shell: bash
      working-directory: ${{ env.SRC_DIR }}
      run: |
        set -euo pipefail

        DEFCONFIG="arch/arm64/configs/gki_defconfig"
        [ -f arch/arm64/configs/rosemary_defconfig ] && DEFCONFIG="arch/arm64/configs/rosemary_defconfig"
        [ -f arch/arm64/configs/gale_defconfig ] && DEFCONFIG="arch/arm64/configs/gale_defconfig"

        sed -i '/CONFIG_VIRTUALIZATION=/d' "$DEFCONFIG"
        sed -i '/CONFIG_KVM=/d' "$DEFCONFIG"
        sed -i '/CONFIG_KVM_ARM_HOST=/d' "$DEFCONFIG"
        sed -i '/CONFIG_KVM_ARM_TIMER=/d' "$DEFCONFIG"
        sed -i '/CONFIG_KVM_ARM_VGIC=/d' "$DEFCONFIG"
        sed -i '/CONFIG_KVM_ARM_VGIC_V3=/d' "$DEFCONFIG"
        sed -i '/CONFIG_KVM_ARM_PMU=/d' "$DEFCONFIG"
        sed -i '/CONFIG_KVM_VFIO=/d' "$DEFCONFIG"
        sed -i '/CONFIG_KVM_GENERIC_DIRTYLOG_READ_PROTECT=/d' "$DEFCONFIG"

        cat >> "$DEFCONFIG" <<EOF
        CONFIG_VIRTUALIZATION=y
        CONFIG_KVM=m
        CONFIG_KVM_ARM_HOST=y
        CONFIG_KVM_ARM_TIMER=y
        CONFIG_KVM_ARM_VGIC=y
        CONFIG_KVM_ARM_VGIC_V3=y
        CONFIG_KVM_ARM_PMU=y
        CONFIG_KVM_VFIO=y
        CONFIG_KVM_GENERIC_DIRTYLOG_READ_PROTECT=y
        EOF

        echo "arch/arm64/kvm/kvm.ko" >> android/gki_aarch64_modules

        if [ -f modules.bzl ]; then
          sed -i '/COMMON_GKI_MODULES_LIST = \[/a\    "arch/arm64/kvm/kvm.ko",' modules.bzl
          sed -i '/_COMMON_GKI_MODULES_LIST = \[/a\    "arch/arm64/kvm/kvm.ko",' modules.bzl
        fi


    # =========================
    # PATCH ENGINE (FULL)
    # =========================
    - name: Apply Categorized Patches
      shell: bash
      working-directory: ${{ env.SRC_DIR }}
      run: |
        set -euo pipefail

        VERSION="${{ inputs.kernel_version }}"
        PATCH_ROOT="$GITHUB_WORKSPACE/.github/patches"

        apply_patch() {
          local patch_file="$1"
          echo "Applying patch: $patch_file"
          patch -p1 --forward --fuzz=3 < "$patch_file" || { echo "Error: Patch failed: $patch_file"; exit 1; }
          if find . -name "*.rej" | grep -q .; then
            echo "Error: Reject files found after applying $patch_file"
            exit 1
          fi
        }

        run_item() {
          local item="$1"

          if [ -f "$item" ]; then
            case "$item" in
              *.patch) apply_patch "$item" ;;
              *.sh) bash "$item" ;;
            esac
          fi

          if [ -d "$item" ]; then
            if [ -f "$item/apply.sh" ]; then
              bash "$item/apply.sh"
            else
              find "$item" -type f \( -name "*.patch" -o -name "*.sh" \) | sort | while read f; do
                run_item "$f"
              done
            fi
          fi
        }

        apply_category() {
          local CATEGORY="$1"
          local ENABLE="$2"

          [ "$ENABLE" != "Yes" ] && return

          BASE="$PATCH_ROOT/$VERSION/$CATEGORY"
          [ ! -d "$BASE" ] && return

          find "$BASE" -mindepth 1 | sort | while read item; do
            run_item "$item"
          done
        }

        apply_category "cpu_scheduler" "${{ inputs.apply_cpu_scheduler_patches }}"
        apply_category "fs" "${{ inputs.apply_fs_patches }}"
        apply_category "memory" "${{ inputs.apply_memory_patches }}"
        apply_category "network" "${{ inputs.apply_network_patches }}"
        apply_category "power_management" "${{ inputs.apply_power_management_patches }}"
        apply_category "misc" "${{ inputs.apply_misc_patches }}"


    # =========================
    # OTHER PATCHES (SEPARATE TOGGLE)
    # =========================
    - name: Apply Other Patches
      if: inputs.apply_other_patches == 'Yes'
      shell: bash
      working-directory: ${{ env.SRC_DIR }}
      run: |
        set -euo pipefail

        PATCH_ROOT="$GITHUB_WORKSPACE/.github/patches"

        apply_patch() {
          local patch_file="$1"
          echo "Applying patch: $patch_file"
          patch -p1 --forward --fuzz=3 < "$patch_file" || { echo "Error: Patch failed: $patch_file"; exit 1; }
          if find . -name "*.rej" | grep -q .; then
            echo "Error: Reject files found after applying $patch_file"
            exit 1
          fi
        }

        run_item() {
          local item="$1"

          if [ -f "$item" ]; then
            case "$item" in
              *.patch) apply_patch "$item" ;;
              *.sh) bash "$item" ;;
            esac
          fi

          if [ -d "$item" ]; then
            if [ -f "$item/apply.sh" ]; then
              bash "$item/apply.sh"
            else
              find "$item" -type f \( -name "*.patch" -o -name "*.sh" \) | sort | while read f; do
                run_item "$f"
              done
            fi
          fi
        }

        find "$PATCH_ROOT" -mindepth 1 \
          ! -path "*/susfs4ksu*" \
          ! -path "*/zzh_patches*" \
          ! -path "*/$VERSION*" \
          | sort | while read item; do
            run_item "$item"
          done


    # =========================
    # PERFORMANCE PATCH
    # =========================
    - name: Apply Performance Patch
      shell: bash
      working-directory: ${{ env.SRC_DIR }}
      run: |
        if [ "${{ inputs.performance_patch }}" = "Snapdragon" ]; then
          cp $GITHUB_WORKSPACE/.github/patches/qcom-cpufreq-hw.c drivers/cpufreq/qcom-cpufreq-hw.c
        fi


    # =========================
    # ZRAM
    # =========================
    - name: Apply ZRAM Enhance
      if: inputs.apply_zram_enhance == 'Yes'
      shell: bash
      working-directory: ${{ env.SRC_DIR }}
      run: |
        set -euo pipefail

        BASE="$GITHUB_WORKSPACE/.github/patches/zzh_patches/zram"

        cp "$BASE/include/linux/lz4.h" ./include/linux/lz4.h
        cp -r "$BASE/lz4/"* ./lib/lz4/

        bash "$BASE/apply_lz4_neon.sh"

        cat "$GITHUB_WORKSPACE/.github/patches/zzh_patches/config/zram.config" >> arch/arm64/configs/gki_defconfig

        if [ -f modules.bzl ]; then
          sed -i 's/"drivers\/block\/zram\/zram\.ko",//g; s/"mm\/zsmalloc\.ko",//g' modules.bzl
        fi


    # =========================
    # DEVICE FIXES
    # =========================
    - name: Device Specific Fixes
      if: inputs.apply_device_fixes == 'Yes'
      shell: bash
      working-directory: ${{ env.SRC_DIR }}
      run: |
        set -euo pipefail

        bash $GITHUB_WORKSPACE/.github/patches/xiaomi_compat.sh

        cp $GITHUB_WORKSPACE/.github/patches/hmbird_patch.c drivers/misc/hmbird_patch.c

        if ! grep -q "hmbird_patch.o" drivers/misc/Makefile; then
          echo "obj-y += hmbird_patch.o" >> drivers/misc/Makefile
        fi


    # =========================
    # EXTERNAL ACTIONS
    # =========================
    - name: Apply vTomsonek
      if: inputs.apply_vtomsonek == 'Yes'
      uses: ./.github/actions/vtomsonek
      with:
        android_version: ${{ env.ANDR_VER }}
        kernel_version: "${{ inputs.kernel_version }}"
        os_patch_level: "2024-07"
        sublevel: ${{ env.SUBLEVEL }}

    - name: Apply Hakan
      if: inputs.apply_hakan == 'Yes'
      uses: ./.github/actions/hakan


    # =========================
    # FINAL PERF TWEAK
    # =========================
    - name: Defconfig Performance Tweaks
      if: inputs.apply_cpu_scheduler_patches == 'Yes'
      shell: bash
      working-directory: ${{ env.SRC_DIR }}
      run: |
        bash $GITHUB_WORKSPACE/.github/patches/common_perf.sh
