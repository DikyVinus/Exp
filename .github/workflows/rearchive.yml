name: Rearchive to 7z

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Local repo path or URL to archive"
        required: true
        type: string
      output_name:
        description: "Base name for output .7z"
        required: false
        default: "repacked"
        type: string

jobs:
  rearchive:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full curl wget file

      - name: Fetch source archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p work/input work/extracted work/output

          SRC='${{ inputs.source }}'

          is_url() {
            [[ "$1" =~ ^https?:// ]]
          }

          if is_url "$SRC"; then
            echo "Source is URL: $SRC"

            # First try wget because it handles redirects and Content-Disposition nicely.
            # This supports both direct links and links that redirect to the actual file.
            if wget \
              --trust-server-names \
              --content-disposition \
              -O work/input/download.tmp \
              "$SRC"; then
              mv work/input/download.tmp work/input/source.archive
            else
              echo "wget failed, retrying with curl"
              curl -fL --retry 3 --retry-delay 2 -o work/input/source.archive "$SRC"
            fi
          else
            echo "Source is repo file: $SRC"
            if [ ! -f "$SRC" ]; then
              echo "File not found in repository: $SRC"
              exit 1
            fi
            cp "$SRC" work/input/source.archive
          fi

          if [ ! -s work/input/source.archive ]; then
            echo "Downloaded/copied archive is empty"
            exit 1
          fi

          echo "Saved input as:"
          ls -lh work/input/source.archive
          file work/input/source.archive || true

      - name: Extract source archive
        shell: bash
        run: |
          set -euo pipefail
          7z x work/input/source.archive -owork/extracted

      - name: Create high-compression 7z archive
        shell: bash
        run: |
          set -euo pipefail
          out="work/output/${{ inputs.output_name }}.7z"

          7z a "$out" ./work/extracted/* \
            -t7z \
            -m0=lzma2 \
            -mx=9 \
            -mfb=273 \
            -md=256m \
            -ms=on \
            -mmt=2

          echo "Created: $out"
          7z l "$out"

      - name: Upload repacked archive
        uses: actions/upload-artifact@v4
        with:
          name: repacked-7z
          path: work/output/*.7z
