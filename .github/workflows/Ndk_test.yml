name: Validate latest ARM64-hosted NDK release

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  validate-latest-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl jq p7zip-full tar file findutils coreutils grep sed libarchive-tools

      - name: Resolve latest release asset
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          API="https://api.github.com/repos/DikyVinus/Exp/releases/latest"

          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "$API" > latest.json

          tag_name="$(jq -r '.tag_name' latest.json)"
          release_name="$(jq -r '.name' latest.json)"

          asset_url="$(jq -r '
            .assets[]
            | select(.name | endswith(".tar.7z"))
            | .browser_download_url
          ' latest.json | head -n1)"

          asset_name="$(jq -r '
            .assets[]
            | select(.name | endswith(".tar.7z"))
            | .name
          ' latest.json | head -n1)"

          if [ -z "$asset_url" ] || [ "$asset_url" = "null" ]; then
            echo "No .tar.7z asset found in latest release"
            jq -r '.assets[]?.name' latest.json || true
            exit 1
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "asset_url=$asset_url" >> "$GITHUB_OUTPUT"
          echo "asset_name=$asset_name" >> "$GITHUB_OUTPUT"

          {
            echo "## Latest release"
            echo "- Tag: \`$tag_name\`"
            echo "- Name: \`$release_name\`"
            echo "- Asset: \`$asset_name\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Download latest asset
        run: |
          mkdir -p work
          wget -O "work/${{ steps.meta.outputs.asset_name }}" "${{ steps.meta.outputs.asset_url }}"
          test -s "work/${{ steps.meta.outputs.asset_name }}"
          ls -lh "work/${{ steps.meta.outputs.asset_name }}"

      - name: Extract tar.7z
        run: |
          mkdir -p work/extract_outer work/extract_root

          7z x "work/${{ steps.meta.outputs.asset_name }}" -owork/extract_outer

          TAR_FILE="$(find work/extract_outer -maxdepth 1 -type f -name '*.tar' | head -n1)"
          [ -n "$TAR_FILE" ] || { echo "Inner .tar not found"; exit 1; }

          echo "TAR_FILE=$TAR_FILE" >> "$GITHUB_ENV"

          tar -xpf "$TAR_FILE" -C work/extract_root

          ROOT_DIR="$(find work/extract_root -mindepth 1 -maxdepth 1 -type d | head -n1)"
          [ -n "$ROOT_DIR" ] || { echo "Extracted root dir not found"; exit 1; }

          echo "ROOT_DIR=$ROOT_DIR" >> "$GITHUB_ENV"

          {
            echo "## Extracted package"
            echo "- Inner tar: \`$(basename "$TAR_FILE")\`"
            echo "- Root dir: \`$(basename "$ROOT_DIR")\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate layout
        run: |
          NDK_ROOT="$ROOT_DIR"
          PREBUILT="$NDK_ROOT/toolchains/llvm/prebuilt/linux-arm64"
          BIN="$PREBUILT/bin"
          SYSROOT="$PREBUILT/sysroot"

          fail() {
            echo "ERROR: $*" >&2
            exit 1
          }

          check_path() {
            [ -e "$1" ] || fail "Missing path: $1"
          }

          check_symlink_or_file() {
            [ -e "$1" ] || [ -L "$1" ] || fail "Missing file/symlink: $1"
          }

          check_arm64_elf() {
            local target="$1"
            local desc
            desc="$(file -b "$target")"
            echo "$desc" | grep -qi 'ELF' || fail "$target is not ELF: $desc"
            echo "$desc" | grep -qiE 'aarch64|arm64' || fail "$target is not ARM64 ELF: $desc"
          }

          echo "NDK_ROOT=$NDK_ROOT"
          check_path "$NDK_ROOT/toolchains/llvm/prebuilt"
          check_path "$PREBUILT"
          check_path "$BIN"
          check_path "$SYSROOT"
          check_path "$SYSROOT/usr/include"
          check_path "$SYSROOT/usr/lib"

          # Useful but not fatal if layout shifts slightly
          [ -e "$SYSROOT/usr/include/android/api-level.h" ] || echo "Warning: api-level.h not found at expected path"

          for f in \
            clang clang++ ld.lld lld llvm-ar llvm-ranlib llvm-nm \
            llvm-objcopy llvm-objdump llvm-readelf llvm-strip
          do
            check_symlink_or_file "$BIN/$f"
          done

          for f in clang ld.lld llvm-ar llvm-nm llvm-objcopy llvm-strip; do
            target="$(readlink -f "$BIN/$f")"
            [ -n "$target" ] || fail "Could not resolve $BIN/$f"
            check_arm64_elf "$target"
          done

          # Flexible sysroot / target dir checks
          find "$SYSROOT/usr/lib" -type d -name 'aarch64-linux-android*' | grep -q . \
            || fail "Could not find any aarch64-linux-android sysroot lib directory"

          echo "Searching for crtbegin/crtend flexibly..."
          find "$PREBUILT" -type f \( \
            -name 'crtbegin*.o' -o \
            -name 'crtend*.o' -o \
            -name 'crtbegin*.S' -o \
            -name 'crtend*.S' \
          \) | sort | tee work-crt-files.txt || true

          if [ ! -s work-crt-files.txt ]; then
            echo "Warning: no crtbegin/crtend files found by filename scan"
            echo "This may still be usable if the package uses a different layout"
          fi

          # Fail only on absolute symlinks, not on relative ones
          bad_abs=0
          while IFS= read -r -d '' link; do
            target="$(readlink "$link")"
            case "$target" in
              /*)
                echo "ABSOLUTE_SYMLINK $link -> $target"
                bad_abs=1
                ;;
            esac
          done < <(find "$NDK_ROOT" -type l -print0)

          [ "$bad_abs" -eq 0 ] || fail "Found absolute symlink(s)"

          {
            echo "## Layout validation"
            echo "- linux-arm64 prebuilt tree: present"
            echo "- ARM64 host binaries: present"
            echo "- Android sysroot: present"
            echo "- aarch64 target lib dir: present"
            if [ -s work-crt-files.txt ]; then
              echo "- crt objects: found"
            else
              echo "- crt objects: not found by filename scan"
            fi
            echo "- No absolute symlink failures detected"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Inspect key files
        run: |
          NDK_ROOT="$ROOT_DIR"
          BIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-arm64/bin"

          {
            echo "## Key file inspection"
            echo '```'
            file "$BIN/clang"
            file "$BIN/ld.lld"
            file "$BIN/llvm-ar"
            echo
            echo "Sample symlinks:"
            find "$BIN" -maxdepth 1 -type l | sort | head -20
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verdict
        run: |
          {
            echo "## Verdict"
            echo "This release is structurally correct for an ARM64-hosted NDK package."
            echo
            echo "It is **likely usable**, but this workflow does not execute ARM64 host binaries on x86."
            echo
            echo "For full confirmation, run an ARM64 runtime smoke test on-device or in an ARM64 chroot:"
            echo
            echo '```bash'
            echo 'toolchains/llvm/prebuilt/linux-arm64/bin/clang --version'
            echo 'toolchains/llvm/prebuilt/linux-arm64/bin/ld.lld --version'
            echo 'cat > hello.c <<'"'"'EOF'"'"''
            echo 'int main(void) { return 0; }'
            echo 'EOF'
            echo 'toolchains/llvm/prebuilt/linux-arm64/bin/clang \'
            echo '  --target=aarch64-linux-android21 \'
            echo '  --sysroot=toolchains/llvm/prebuilt/linux-arm64/sysroot \'
            echo '  -fuse-ld=lld hello.c -o hello'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
