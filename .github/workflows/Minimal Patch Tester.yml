Cleaned, deterministic, adds:

mode switch: single version vs all

hard failure aggregation (no silent success)

clear error output

proper exit at end

no duplicate manager runs

consistent patch traversal


name: Minimal Patch Tester

on:
  workflow_dispatch:
    inputs:
      kernel:
        description: "Kernel version (or 'all')"
        default: "all"
      fail_fast:
        description: "Stop on first failure"
        default: "false"

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run tester
        shell: bash
        run: |
          set -uo pipefail

          git config --global user.name "CoreShift"
          git config --global user.email "build@coreshift.dev"

          SUMMARY=summary.log
          > "$SUMMARY"

          FAIL_COUNT=0

          fail() {
            echo "FAIL $1" >> "$SUMMARY"
            FAIL_COUNT=$((FAIL_COUNT+1))
            [ "${{ inputs.fail_fast }}" = "true" ] && exit 1
          }

          ok() {
            echo "OK $1" >> "$SUMMARY"
          }

          check_rejects() {
            if find . -name "*.rej" | grep -q .; then
              find . -name "*.rej" -exec cat {} \; >> "../../$SUMMARY"
              find . -name "*.rej" -delete
              return 1
            fi
            return 0
          }

          run_item() {
            local item="$1"

            if [ -f "$item" ]; then
              case "$item" in
                *.patch) patch -p1 --forward --fuzz=3 < "$item" || true ;;
                *.sh) bash "$item" || true ;;
              esac
            fi

            if [ -d "$item" ]; then
              if [ -f "$item/apply.sh" ]; then
                bash "$item/apply.sh" || true
              else
                find "$item" -type f \( -name "*.patch" -o -name "*.sh" \) | sort | while read f; do
                  run_item "$f"
                done
              fi
            fi
          }

          run_susfs() {
            case "$1" in
              4.19) run_item "../../.github/patches/susfs4ksu/4.19" ;;
              5.10) run_item "../../.github/patches/susfs4ksu/gki-android12-5.10" ;;
              6.1)  run_item "../../.github/patches/susfs4ksu/gki-android14-6.1" ;;
              6.6)  run_item "../../.github/patches/susfs4ksu/gki-android15-6.6" ;;
            esac
          }

          run_version() {
            local version="$1"
            local SRC="src/$version"

            echo "==========================================================" >> "$SUMMARY"
            echo "SUMMARY FOR $version ($SRC)" >> "$SUMMARY"
            echo "==========================================================" >> "$SUMMARY"
            echo "" >> "$SUMMARY"

            cd "$SRC"

            git reset --hard HEAD >/dev/null
            git clean -fd >/dev/null

            echo "ROOT MANAGERS" >> "../../$SUMMARY"

            declare -A seen
            managers=()

            for dir in ../../manager/*; do
              name=$(basename "$dir")
              if echo "$name" | grep -q "$version"; then
                [ -z "${seen[$name]+x}" ] && managers+=("$dir") && seen[$name]=1
              fi
            done

            for dir in ../../manager/*; do
              name=$(basename "$dir")
              if ! echo "$name" | grep -Eq '[0-9]+\.[0-9]+'; then
                [ -z "${seen[$name]+x}" ] && managers+=("$dir") && seen[$name]=1
              fi
            done

            for manager in "${managers[@]}"; do
              name=$(basename "$manager")

              [ -f "../../$manager/kernel/setup.sh" ] && \
                bash "../../$manager/kernel/setup.sh" || true

              if check_rejects; then ok "$name"; else fail "$name"; fi

              git reset --hard HEAD >/dev/null
              git clean -fd >/dev/null
            done

            echo "" >> "../../$SUMMARY"
            echo "SUSFS" >> "../../$SUMMARY"

            run_susfs "$version"

            if check_rejects; then ok "susfs"; else fail "susfs"; fi

            git reset --hard HEAD >/dev/null
            git clean -fd >/dev/null

            echo "" >> "../../$SUMMARY"
            echo "PATCH GROUPS" >> "../../$SUMMARY"

            BASE="../../.github/patches/$version"

            if [ -d "$BASE" ]; then
              find "$BASE" -mindepth 1 -maxdepth 1 | sort | while read catdir; do
                cname=$(basename "$catdir")

                find "$catdir" -mindepth 1 | sort | while read item; do
                  run_item "$item"
                done

                if check_rejects; then ok "category $cname"; else fail "category $cname"; fi

                git reset --hard HEAD >/dev/null
                git clean -fd >/dev/null
              done
            else
              echo "EMPTY patch groups" >> "../../$SUMMARY"
            fi

            echo "" >> "../../$SUMMARY"
            echo "OTHER PATCHES" >> "../../$SUMMARY"

            BASE="../../.github/patches"

            find "$BASE" -mindepth 1 -maxdepth 1 | while read item; do
              name=$(basename "$item")
              case "$name" in
                anykernel3|susfs4ksu|$version) continue ;;
              esac
              run_item "$item"
            done

            if check_rejects; then ok "other"; else fail "other"; fi

            git reset --hard HEAD >/dev/null
            git clean -fd >/dev/null

            cd ../..
            echo "" >> "$SUMMARY"
          }

          if [ "${{ inputs.kernel }}" = "all" ]; then
            for v in 4.19 5.10 6.1 6.6; do
              run_version "$v"
            done
          else
            run_version "${{ inputs.kernel }}"
          fi

          echo "TOTAL FAILURES: $FAIL_COUNT" >> "$SUMMARY"

          if [ "$FAIL_COUNT" -ne 0 ]; then
            echo "Patch test failed with $FAIL_COUNT errors"
            exit 1
          fi

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: summary-log
          path: summary.log

      - name: Print summary
        run: cat summary.log
