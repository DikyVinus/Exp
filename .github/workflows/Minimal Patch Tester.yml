name: Minimal Patch Tester

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run all kernels sequentially
        shell: bash
        run: |
          set -euo pipefail

          git config --global user.name "CoreShift"
          git config --global user.email "build@coreshift.dev"

          touch summary.log

          run_item() {
            local item="$1"

            if [ -f "$item" ]; then
              case "$item" in
                *.patch)
                  patch -p1 --forward --fuzz=3 < "$item" > /dev/null 2>&1 || true
                  ;;
                *.sh)
                  bash "$item" > /dev/null 2>&1 || true
                  ;;
              esac
            fi

            if [ -d "$item" ]; then
              if [ -f "$item/apply.sh" ]; then
                bash "$item/apply.sh" > /dev/null 2>&1 || true
              else
                find "$item" -type f \( -name "*.patch" -o -name "*.sh" \) | sort | while read f; do
                  run_item "$f"
                done
              fi
            fi
          }

          run_susfs() {
            case "$1" in
              4.19)
                run_item "../../.github/patches/susfs4ksu/4.19"
                ;;
              5.10)
                [ -f "../../.github/patches/susfs4ksu/gki-android12-5.10/apply.sh" ] && \
                run_item "../../.github/patches/susfs4ksu/gki-android12-5.10"
                ;;
              6.1)
                [ -f "../../.github/patches/susfs4ksu/gki-android14-6.1/apply.sh" ] && \
                run_item "../../.github/patches/susfs4ksu/gki-android14-6.1"
                ;;
              6.6)
                [ -f "../../.github/patches/susfs4ksu/gki-android15-6.6/apply.sh" ] && \
                run_item "../../.github/patches/susfs4ksu/gki-android15-6.6"
                ;;
            esac
          }

          for version in 4.19 5.10 6.1 6.6; do

            SRC="src/$version"

            echo "==========================================================" >> summary.log
            echo "SUMMARY FOR $version ($SRC)" >> summary.log
            echo "==========================================================" >> summary.log
            echo "" >> summary.log

            cd "$SRC"

            git reset --hard HEAD >/dev/null
            git clean -fd >/dev/null

            echo "ROOT MANAGERS" >> ../../summary.log

            managers=()

            for dir in ../../manager/*; do
              name=$(basename "$dir")
              if echo "$name" | grep -q "$version"; then
                managers+=("$dir")
              fi
            done

            for dir in ../../manager/*; do
              name=$(basename "$dir")
              if ! echo "$name" | grep -Eq '[0-9]+\.[0-9]+'; then
                managers+=("$dir")
              fi
            done

            for manager in "${managers[@]}"; do
              name=$(basename "$manager")

              if [ -f "../../$manager/kernel/setup.sh" ]; then
                bash "../../$manager/kernel/setup.sh" > /dev/null 2>&1 || true
              fi

              if find . -name "*.rej" | grep -q .; then
                echo "FAIL $name" >> ../../summary.log
                find . -name "*.rej" -exec cat {} \; >> ../../summary.log
                find . -name "*.rej" -delete
              else
                echo "OK $name" >> ../../summary.log
              fi

              git reset --hard HEAD >/dev/null
              git clean -fd >/dev/null
            done

            echo "" >> ../../summary.log
            echo "SUSFS" >> ../../summary.log

            run_susfs "$version"

            if find . -name "*.rej" | grep -q .; then
              echo "FAIL susfs" >> ../../summary.log
              find . -name "*.rej" -exec cat {} \; >> ../../summary.log
              find . -name "*.rej" -delete
            else
              echo "OK susfs" >> ../../summary.log
            fi

            git reset --hard HEAD >/dev/null
            git clean -fd >/dev/null

            echo "" >> ../../summary.log
            echo "PATCH GROUPS" >> ../../summary.log

            BASE="../../.github/patches/$version"

            if [ -d "$BASE" ]; then
              find "$BASE" -mindepth 1 -maxdepth 1 | sort | while read catdir; do
                cname=$(basename "$catdir")

                find "$catdir" -mindepth 1 -maxdepth 1 | sort | while read item; do
                  run_item "$item"
                done

                if find . -name "*.rej" | grep -q .; then
                  echo "FAIL category $cname" >> ../../summary.log
                  find . -name "*.rej" -exec cat {} \; >> ../../summary.log
                  find . -name "*.rej" -delete
                else
                  echo "OK category $cname" >> ../../summary.log
                fi

                git reset --hard HEAD >/dev/null
                git clean -fd >/dev/null
              done
            else
              echo "EMPTY patch groups" >> ../../summary.log
            fi

            echo "" >> ../../summary.log
            echo "OTHER PATCHES" >> ../../summary.log

            BASE="../../.github/patches"

            find "$BASE" -mindepth 1 -maxdepth 1 | while read item; do
              name=$(basename "$item")
              if [ "$name" = "anykernel3" ] || [ "$name" = "susfs4ksu" ]; then
                continue
              fi
              run_item "$item"
            done

            if find . -name "*.rej" | grep -q .; then
              echo "FAIL other" >> ../../summary.log
              find . -name "*.rej" -exec cat {} \; >> ../../summary.log
              find . -name "*.rej" -delete
            else
              echo "OK other" >> ../../summary.log
            fi

            git reset --hard HEAD >/dev/null
            git clean -fd >/dev/null

            cd ../..
            echo "" >> summary.log
          done

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: summary-log
          path: summary.log

      - name: Print summary
        shell: bash
        run: |
          cat summary.log
