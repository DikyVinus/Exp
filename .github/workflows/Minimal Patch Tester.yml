name: Minimal Patch Tester

on:
  workflow_dispatch:
    inputs:
      kernel:
        description: Kernel version
        required: true
        default: all
        type: choice
        options:
          - all
          - 4.19
          - 5.10
          - 6.1
          - 6.6
      fail_fast:
        description: Stop on first failure
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init required submodules only
        shell: bash
        run: |
          set -e

          KERNEL="${{ inputs.kernel }}"
if [ "$KERNEL" = "all" ]; then
            git submodule update --init --recursive
          else
            git submodule update --init src/${{ inputs.kernel }}
          fi

      - name: Run tester
        shell: bash
        run: |
          set -euo pipefail

          git config --global user.name "CoreShift"
          git config --global user.email "build@coreshift.dev"

          SUMMARY=summary.log
          > "$SUMMARY"

          FAIL_COUNT=0
          FAIL_FAST="${{ inputs.fail_fast }}"

          fail() {
            echo "FAIL $1" >> "$SUMMARY"
            FAIL_COUNT=$((FAIL_COUNT+1))
            if [ "$FAIL_FAST" = "true" ]; then exit 1; fi
          }

          ok() {
            echo "OK $1" >> "$SUMMARY"
          }

          check_rejects() {
            if find . -name "*.rej" -print -quit | grep -q .; then
              find . -name "*.rej" -exec cat {} \; >> "../../$SUMMARY"
              find . -name "*.rej" -delete
              return 1
            fi
            return 0
          }

          apply_patch() {
            patch -p1 --forward --fuzz=3 < "$1" >/dev/null 2>&1
          }

          run_file() {
            case "$1" in
              *.patch) apply_patch "$1" || return 1 ;;
              *.sh) bash "$1" >/dev/null 2>&1 || return 1 ;;
            esac
          }

          run_dir() {
            local d="$1"

            if [ -f "$d/apply.sh" ]; then
              bash "$d/apply.sh" >/dev/null 2>&1 || return 1
              return
            fi

            while IFS= read -r f; do
              run_file "$f" || return 1
            done < <(find "$d" -type f \( -name "*.patch" -o -name "*.sh" \) | sort)
          }

          run_item() {
            [ -f "$1" ] && run_file "$1" && return
            [ -d "$1" ] && run_dir "$1"
          }

          run_susfs() {
            local v="$1"
            local BASE="../../.github/patches/susfs4ksu"

            if [ "$v" = "4.19" ]; then
              run_dir "$BASE/4.19" || return 1
              return
            fi

            case "$v" in
              5.10) DIR="$BASE/gki-android12-5.10" ;;
              6.1)  DIR="$BASE/gki-android14-6.1" ;;
              6.6)  DIR="$BASE/gki-android15-6.6" ;;
            esac

            [ ! -d "$DIR" ] && return 1

            [ -d "$DIR/fs" ] && cp -r "$DIR/fs" . || true
            [ -d "$DIR/include" ] && cp -r "$DIR/include" . || true

            for p in "$DIR"/50_*.patch; do
              [ -f "$p" ] && apply_patch "$p" || true
            done

            while IFS= read -r p; do
              apply_patch "$p" || return 1
            done < <(find "$DIR" -type f -name "*.patch" ! -name "50_*" | sort)
          }

          run_version() {
            local v="$1"
            local SRC="src/$v"

            echo "==========================================================" >> "$SUMMARY"
            echo "SUMMARY FOR $v ($SRC)" >> "$SUMMARY"
            echo "==========================================================" >> "$SUMMARY"
            echo "" >> "$SUMMARY"

            cd "$SRC"

            git reset --hard HEAD >/dev/null
            git clean -fd >/dev/null

            echo "ROOT MANAGERS" >> "../../$SUMMARY"

            managers=()
            for d in ../../manager/*; do
              name=$(basename "$d")
              echo "$name" | grep -q "$v" && managers+=("$d")
            done

            for m in "${managers[@]}"; do
              name=$(basename "$m")

              if [ -f "../../$m/kernel/setup.sh" ]; then
                bash "../../$m/kernel/setup.sh" >/dev/null 2>&1 || fail "$name"
              fi

              check_rejects && ok "$name" || fail "$name"

              git reset --hard HEAD >/dev/null
              git clean -fd >/dev/null
            done

            echo "" >> "../../$SUMMARY"
            echo "SUSFS" >> "../../$SUMMARY"

            run_susfs "$v" || fail "susfs"
            check_rejects && ok "susfs" || fail "susfs"

            git reset --hard HEAD >/dev/null
            git clean -fd >/dev/null

            echo "" >> "../../$SUMMARY"
            echo "PATCH GROUPS" >> "../../$SUMMARY"

            BASE="../../.github/patches/$v"

            if [ -d "$BASE" ]; then
              for catdir in "$BASE"/*; do
                [ -d "$catdir" ] || continue
                cname=$(basename "$catdir")

                run_dir "$catdir" || fail "category $cname"
                check_rejects && ok "category $cname" || fail "category $cname"

                git reset --hard HEAD >/dev/null
                git clean -fd >/dev/null
              done
            else
              echo "EMPTY patch groups" >> "../../$SUMMARY"
            fi

            echo "" >> "../../$SUMMARY"
            echo "OTHER PATCHES" >> "../../$SUMMARY"

            for item in ../../.github/patches/*; do
              name=$(basename "$item")
              case "$name" in
                anykernel3|susfs4ksu|$v) continue ;;
              esac

              run_item "$item" || fail "other:$name"
            done

            check_rejects && ok "other" || fail "other"

            git reset --hard HEAD >/dev/null
            git clean -fd >/dev/null

            cd ../..
            echo "" >> "$SUMMARY"
          }

          if [ "${{ inputs.kernel }}" = "all" ]; then
            for v in 4.19 5.10 6.1 6.6; do
              run_version "$v"
            done
          else
            run_version "${{ inputs.kernel }}"
          fi

          echo "TOTAL FAILURES: $FAIL_COUNT" >> "$SUMMARY"
          [ "$FAIL_COUNT" -ne 0 ] && exit 1

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: summary-log
          path: summary.log

      - name: Print summary
        run: cat summary.log
