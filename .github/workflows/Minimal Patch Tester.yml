name: Minimal Patch Tester

on:
  workflow_dispatch:
    inputs:
      kernel:
        description: Kernel version
        required: true
        default: all
        type: choice
        options:
          - all
          - k419
          - k510
          - k61
          - k66
      fail_fast:
        description: Stop on first failure
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init submodules
        shell: bash
        run: |
          set -e

          case "${{ inputs.kernel }}" in
            all)
              git submodule update --init --recursive
              ;;
            k419)
              git submodule update --init src/4.19
              ;;
            k510)
              git submodule update --init src/5.10
              ;;
            k61)
              git submodule update --init src/6.1
              ;;
            k66)
              git submodule update --init src/6.6
              ;;
          esac

      - name: Run tester
        shell: bash
        run: |

          FAIL_FAST="${{ inputs.fail_fast }}"
          SUMMARY=summary.log
          > "$SUMMARY"

          FAIL_COUNT=0

          fail() {
            echo "FAIL $1" >> "$SUMMARY"
            FAIL_COUNT=$((FAIL_COUNT+1))
            [ "$FAIL_FAST" = "true" ] && exit 1
          }

          ok() {
            echo "OK $1" >> "$SUMMARY"
          }

          check_rejects() {
            if find . -name "*.rej" -print -quit | grep -q .; then
              find . -name "*.rej" -exec cat {} \; >> "../../$SUMMARY"
              find . -name "*.rej" -delete
              return 1
            fi
            return 0
          }

          apply_patch() {
            patch -p1 --forward --fuzz=3 < "$1" >/dev/null 2>&1
          }

          run_file() {
            case "$1" in
              *.patch) apply_patch "$1" || return 1 ;;
              *.sh) bash "$1" >/dev/null 2>&1 || return 1 ;;
            esac
          }

          run_dir() {
            local d="$1"

            if [ -f "$d/apply.sh" ]; then
              bash "$d/apply.sh" >/dev/null 2>&1 || return 1
              return
            fi

            while IFS= read -r f; do
              run_file "$f" || return 1
            done < <(find "$d" -type f \( -name "*.patch" -o -name "*.sh" \) | sort)
          }

          run_susfs() {
            local v="$1"
            local BASE="../../.github/patches/susfs4ksu"

            if [ "$v" = "4.19" ]; then
              run_dir "$BASE/4.19" || return 1
              return
            fi

            case "$v" in
              5.10) DIR="$BASE/gki-android12-5.10" ;;
              6.1)  DIR="$BASE/gki-android14-6.1" ;;
              6.6)  DIR="$BASE/gki-android15-6.6" ;;
            esac

            [ ! -d "$DIR" ] && return 1

            cp -r "$DIR/fs" . 2>/dev/null || true
            cp -r "$DIR/include" . 2>/dev/null || true

            for p in "$DIR"/50_*.patch; do
              [ -f "$p" ] && apply_patch "$p" || true
            done

            while IFS= read -r p; do
              apply_patch "$p" || return 1
            done < <(find "$DIR" -type f -name "*.patch" ! -name "50_*" | sort)
          }

          run_version() {
            local v="$1"
            local SRC="src/$v"

            [ ! -d "$SRC" ] && fail "missing $SRC" && return

            echo "==========================================================" >> "$SUMMARY"
            echo "SUMMARY FOR $v ($SRC)" >> "$SUMMARY"
            echo "==========================================================" >> "$SUMMARY"
            echo "" >> "$SUMMARY"

            cd "$SRC"

            git reset --hard HEAD >/dev/null
            git clean -fd >/dev/null

            echo "ROOT MANAGERS" >> "../../$SUMMARY"

            for d in ../../manager/*; do
              name=$(basename "$d")
              echo "$name" | grep -q "$v" || continue

              if [ -f "../../$d/kernel/setup.sh" ]; then
                bash "../../$d/kernel/setup.sh" >/dev/null 2>&1 || fail "$name"
              fi

              check_rejects && ok "$name" || fail "$name"

              git reset --hard HEAD >/dev/null
              git clean -fd >/dev/null
            done

            echo "" >> "../../$SUMMARY"
            echo "SUSFS" >> "../../$SUMMARY"

            run_susfs "$v" || fail "susfs"
            check_rejects && ok "susfs" || fail "susfs"

            git reset --hard HEAD >/dev/null
            git clean -fd >/dev/null

            echo "" >> "../../$SUMMARY"
            echo "PATCH GROUPS" >> "../../$SUMMARY"

            BASE="../../.github/patches/$v"

            if [ -d "$BASE" ]; then
              for catdir in "$BASE"/*; do
                [ -d "$catdir" ] || continue
                cname=$(basename "$catdir")

                run_dir "$catdir" || fail "category $cname"
                check_rejects && ok "category $cname" || fail "category $cname"

                git reset --hard HEAD >/dev/null
                git clean -fd >/dev/null
              done
            else
              echo "EMPTY patch groups" >> "../../$SUMMARY"
            fi

            echo "" >> "../../$SUMMARY"
            echo "OTHER PATCHES" >> "../../$SUMMARY"

            for item in ../../.github/patches/*; do
              name=$(basename "$item")
              case "$name" in
                anykernel3|susfs4ksu|$v) continue ;;
              esac

              if [ -f "$item" ]; then
                run_file "$item" || fail "other:$name"
              elif [ -d "$item" ]; then
                run_dir "$item" || fail "other:$name"
              fi
            done

            check_rejects && ok "other" || fail "other"

            git reset --hard HEAD >/dev/null
            git clean -fd >/dev/null

            cd ../..
            echo "" >> "$SUMMARY"
          }

          case "${{ inputs.kernel }}" in
            all)
              for v in 4.19 5.10 6.1 6.6; do
                run_version "$v"
              done
              ;;
            k419) run_version "4.19" ;;
            k510) run_version "5.10" ;;
            k61)  run_version "6.1" ;;
            k66)  run_version "6.6" ;;
          esac

          echo "TOTAL FAILURES: $FAIL_COUNT" >> "$SUMMARY"
          [ "$FAIL_COUNT" -ne 0 ] && exit 1

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: summary-log
          path: summary.log

      - name: Print summary
        run: cat summary.log
