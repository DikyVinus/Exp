name: Minimal Patch Tester

on:
  workflow_dispatch:
    inputs:
      kernel:
        description: "Kernel version or 'all'"
        required: true
        default: "all"
        type: string
      fail_fast:
        description: "Stop on first failure"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run tester
        shell: bash
        run: |
          set -euo pipefail

          git config --global user.name "CoreShift"
          git config --global user.email "build@coreshift.dev"

          SUMMARY=summary.log
          > "$SUMMARY"

          FAIL_COUNT=0
          FAIL_FAST="${{ inputs.fail_fast }}"

          fail() {
            echo "FAIL $1" >> "$SUMMARY"
            FAIL_COUNT=$((FAIL_COUNT+1))
            if [ "$FAIL_FAST" = "true" ]; then exit 1; fi
          }

          ok() {
            echo "OK $1" >> "$SUMMARY"
          }

          check_rejects() {
            if find . -name "*.rej" -print -quit | grep -q .; then
              find . -name "*.rej" -exec cat {} \; >> "../../$SUMMARY"
              find . -name "*.rej" -delete
              return 1
            fi
            return 0
          }

          apply_patch() {
            local p="$1"
            patch -p1 --forward --fuzz=3 < "$p" >/dev/null 2>&1
          }

          run_file() {
            local f="$1"

            case "$f" in
              *.patch)
                apply_patch "$f" || return 1
                ;;
              *.sh)
                bash "$f" >/dev/null 2>&1 || return 1
                ;;
            esac
          }

          run_dir() {
            local d="$1"

            if [ -f "$d/apply.sh" ]; then
              bash "$d/apply.sh" >/dev/null 2>&1 || return 1
              return 0
            fi

            # deterministic: depth-first, sorted
            while IFS= read -r f; do
              run_file "$f" || return 1
            done < <(find "$d" -type f \( -name "*.patch" -o -name "*.sh" \) | sort)

            return 0
          }

          run_item() {
            local item="$1"

            if [ -f "$item" ]; then
              run_file "$item" || return 1
            elif [ -d "$item" ]; then
              run_dir "$item" || return 1
            fi
          }

          run_susfs() {
            local v="$1"
            local BASE="../../.github/patches/susfs4ksu"

            if [ "$v" = "4.19" ]; then
              run_dir "$BASE/4.19" || return 1
              return 0
            fi

            case "$v" in
              5.10) DIR="$BASE/gki-android12-5.10" ;;
              6.1)  DIR="$BASE/gki-android14-6.1" ;;
              6.6)  DIR="$BASE/gki-android15-6.6" ;;
            esac

            [ ! -d "$DIR" ] && return 0

            # copy stage
            [ -d "$DIR/fs" ] && cp -r "$DIR/fs" . || true
            [ -d "$DIR/include" ] && cp -r "$DIR/include" . || true

            # strict ordering
            for p in "$DIR"/50_*.patch; do
              [ -f "$p" ] && apply_patch "$p" || true
            done

            while IFS= read -r p; do
              apply_patch "$p" || return 1
            done < <(find "$DIR" -type f -name "*.patch" ! -name "50_*" | sort)

            return 0
          }

          run_version() {
            local v="$1"
            local SRC="src/$v"

            echo "==========================================================" >> "$SUMMARY"
            echo "SUMMARY FOR $v ($SRC)" >> "$SUMMARY"
            echo "==========================================================" >> "$SUMMARY"
            echo "" >> "$SUMMARY"

            cd "$SRC"

            git reset --hard HEAD >/dev/null
            git clean -fd >/dev/null

            echo "ROOT MANAGERS" >> "../../$SUMMARY"

            declare -A seen
            managers=()

            for d in ../../manager/*; do
              name=$(basename "$d")
              if echo "$name" | grep -q "$v"; then
                [ -z "${seen[$name]+x}" ] && managers+=("$d") && seen[$name]=1
              fi
            done

            for d in ../../manager/*; do
              name=$(basename "$d")
              if ! echo "$name" | grep -Eq '[0-9]+\.[0-9]+'; then
                [ -z "${seen[$name]+x}" ] && managers+=("$d") && seen[$name]=1
              fi
            done

            for m in "${managers[@]}"; do
              name=$(basename "$m")

              if [ -f "../../$m/kernel/setup.sh" ]; then
                bash "../../$m/kernel/setup.sh" >/dev/null 2>&1 || fail "$name"
              fi

              if check_rejects; then ok "$name"; else fail "$name"; fi

              git reset --hard HEAD >/dev/null
              git clean -fd >/dev/null
            done

            echo "" >> "../../$SUMMARY"
            echo "SUSFS" >> "../../$SUMMARY"

            run_susfs "$v" || fail "susfs"

            if check_rejects; then ok "susfs"; else fail "susfs"; fi

            git reset --hard HEAD >/dev/null
            git clean -fd >/dev/null

            echo "" >> "../../$SUMMARY"
            echo "PATCH GROUPS" >> "../../$SUMMARY"

            BASE="../../.github/patches/$v"

            if [ -d "$BASE" ]; then
              while IFS= read -r catdir; do
                cname=$(basename "$catdir")

                run_dir "$catdir" || fail "category $cname"

                if check_rejects; then ok "category $cname"; else fail "category $cname"; fi

                git reset --hard HEAD >/dev/null
                git clean -fd >/dev/null
              done < <(find "$BASE" -mindepth 1 -maxdepth 1 -type d | sort)
            else
              echo "EMPTY patch groups" >> "../../$SUMMARY"
            fi

            echo "" >> "../../$SUMMARY"
            echo "OTHER PATCHES" >> "../../$SUMMARY"

            while IFS= read -r item; do
              name=$(basename "$item")
              case "$name" in
                anykernel3|susfs4ksu|$v) continue ;;
              esac

              run_item "$item" || fail "other:$name"
            done < <(find ../../.github/patches -mindepth 1 -maxdepth 1 | sort)

            if check_rejects; then ok "other"; else fail "other"; fi

            git reset --hard HEAD >/dev/null
            git clean -fd >/dev/null

            cd ../..
            echo "" >> "$SUMMARY"
          }

          if [ "${{ inputs.kernel }}" = "all" ]; then
            for v in 4.19 5.10 6.1 6.6; do
              run_version "$v"
            done
          else
            run_version "${{ inputs.kernel }}"
          fi

          echo "TOTAL FAILURES: $FAIL_COUNT" >> "$SUMMARY"

          [ "$FAIL_COUNT" -ne 0 ] && exit 1

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: summary-log
          path: summary.log

      - name: Print summary
        run: cat summary.log
