name: Google Kernel + AK3 Build

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: Kernel version
        required: true
        type: choice
        options: ["5.10", "6.1", "6.6"]

      manager:
        description: KSU manager
        required: true
        type: choice
        options:
          - KernelSU
          - KowSU
          - KernelSU-Next
          - ResukiSU
          - Rissu
          - Wild_KSU

      manager_commit:
        description: Optional manager commit
        required: false
        default: ""

      lto_mode:
        description: LTO mode
        required: true
        type: choice
        options:
          - thin
          - full
          - none

      susfs:
        description: Enable SUSFS
        required: true
        type: choice
        options: ["yes", "no"]

      susfs_commit:
        description: Optional SUSFS commit
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Setup
        run: |
          set -euo pipefail
          echo 'precedence ::ffff:0:0/96 100' | sudo tee -a /etc/gai.conf
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1

          git config --global protocol.version 2
          git config --global core.compression 0
          git config --global fetch.parallel $(nproc)

          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            git repo zip curl ccache rsync ca-certificates

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Submodules
        run: |
          set -euo pipefail
          git -c submodule.fetchJobs=$(nproc) submodule update \
            --init --depth=1 --filter=blob:none \
            src/${{ github.event.inputs.kernel_version }} \
            manager/${{ github.event.inputs.manager }}

      - name: Manager commit override
        if: ${{ github.event.inputs.manager_commit != '' }}
        run: |
          set -euo pipefail
          cd manager/${{ github.event.inputs.manager }}
          git fetch origin ${{ github.event.inputs.manager_commit }} --depth=1
          git checkout --detach ${{ github.event.inputs.manager_commit }}

      - name: Vars
        id: vars
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.kernel_version }}" in
            "5.10") echo "branch=common-android12-5.10" >> $GITHUB_OUTPUT; echo "android=android12" >> $GITHUB_OUTPUT ;;
            "6.1")  echo "branch=common-android14-6.1" >> $GITHUB_OUTPUT; echo "android=android14" >> $GITHUB_OUTPUT ;;
            "6.6")  echo "branch=common-android15-6.6" >> $GITHUB_OUTPUT; echo "android=android15" >> $GITHUB_OUTPUT ;;
          esac

      - uses: actions/cache@v4
        with:
          path: kernel/.repo
          key: repo-${{ steps.vars.outputs.branch }}-v1
          restore-keys: |
            repo-${{ steps.vars.outputs.branch }}-

      - name: Repo init + sync
        run: |
          set -euo pipefail
          mkdir -p kernel
          cd kernel

          repo init -u https://android.googlesource.com/kernel/manifest \
            -b ${{ steps.vars.outputs.branch }} --depth=1 || true

          mkdir -p .repo/local_manifests
          echo '<manifest><remove-project name="kernel/common" /></manifest>' > .repo/local_manifests/remove-common.xml

          export REPO_SYNC_FORCE_IPV4=1
          repo sync -c -j$(nproc) \
            --optimized-fetch \
            --no-clone-bundle \
            --prune \
            --fail-fast

      - name: Inject source
        run: |
          set -euo pipefail
          rsync -a --delete src/${{ github.event.inputs.kernel_version }}/ kernel/common/

      - name: Apply patches
        run: |
          set -euo pipefail

          cd kernel/common
          bash ../../manager/${{ github.event.inputs.manager }}/kernel/setup.sh

          if [ "${{ github.event.inputs.susfs }}" = "yes" ]; then
            cd $GITHUB_WORKSPACE

            SUSFS_BRANCH="gki-${{ steps.vars.outputs.android }}-${{ github.event.inputs.kernel_version }}"

            git clone --depth=1 -b "$SUSFS_BRANCH" https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu

            if [ -n "${{ github.event.inputs.susfs_commit }}" ]; then
              cd susfs4ksu
              git fetch origin ${{ github.event.inputs.susfs_commit }} --depth=1
              git checkout --detach ${{ github.event.inputs.susfs_commit }}
              cd ..
            fi

            cd kernel/common

            cp ../../susfs4ksu/kernel_patches/fs/* fs/
            cp ../../susfs4ksu/kernel_patches/include/linux/* include/linux/

            patch -p1 --forward < ../../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ steps.vars.outputs.android }}-${{ github.event.inputs.kernel_version }}.patch || true
          fi

      - name: Config + regen + ccache
        run: |
          set -euo pipefail

          DEFCONFIG=$(find kernel/common -path "*/arch/arm64/configs/gki_defconfig" -print -quit)
          [ -z "$DEFCONFIG" ] && exit 1

          set_y() {
            sed -i "/^$1=/d" "$DEFCONFIG"
            sed -i "/^# $1 is not set/d" "$DEFCONFIG"
            echo "$1=y" >> "$DEFCONFIG"
          }

          set_n() {
            sed -i "/^$1=/d" "$DEFCONFIG"
            sed -i "/^# $1 is not set/d" "$DEFCONFIG"
            echo "# $1 is not set" >> "$DEFCONFIG"
          }

          if [ "${{ github.event.inputs.susfs }}" = "yes" ]; then
            set_y CONFIG_KSU_SUSFS
            set_y CONFIG_KSU_SUSFS_SUS_PATH
            set_y CONFIG_KSU_SUSFS_SUS_MOUNT
            set_y CONFIG_KSU_SUSFS_SUS_KSTAT
            set_y CONFIG_KSU_SUSFS_SPOOF_UNAME
            set_y CONFIG_KSU_SUSFS_OPEN_REDIRECT
            set_y CONFIG_KSU_SUSFS_SUS_MAP
            set_y CONFIG_KSU_SUSFS_ENABLE_LOG
            set_y CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
            set_y CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
          fi

          case "${{ github.event.inputs.lto_mode }}" in
            thin)
              set_n CONFIG_LTO_CLANG_FULL
              set_y CONFIG_LTO_CLANG
              set_y CONFIG_LTO_CLANG_THIN
              ;;
            full)
              set_n CONFIG_LTO_CLANG_THIN
              set_y CONFIG_LTO_CLANG
              set_y CONFIG_LTO_CLANG_FULL
              ;;
            none)
              set_n CONFIG_LTO_CLANG
              set_n CONFIG_LTO_CLANG_THIN
              set_n CONFIG_LTO_CLANG_FULL
              ;;
          esac

          cd kernel
          export ARCH=arm64
          make -C common O=out gki_defconfig

          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          export CCACHE_COMPRESS=1
          ccache -M 5G

      - uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ github.event.inputs.kernel_version }}-v1
          restore-keys: |
            ccache-${{ github.event.inputs.kernel_version }}-

      - name: Build
        run: |
          set -euo pipefail
          cd kernel
          export USE_CCACHE=1
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          export CC="ccache clang"
          export BUILD_CONFIG=common/build.config.gki.aarch64
          export OUT_DIR=$(pwd)/out
          export MAKEFLAGS="-j$(nproc)"
          export NINJA_ARGS="-j$(nproc)"
          bash build/build.sh

      - name: Package
        run: |
          set -euo pipefail

          git clone --depth=1 --filter=blob:none https://github.com/DikyVinus/AnyKernel3 AnyKernel3

          IMAGE=$(find kernel/out/dist -name "Image*" -print -quit)
          [ -z "$IMAGE" ] && IMAGE=$(find kernel/out -name "Image*" -print -quit)
          [ -z "$IMAGE" ] && exit 1

          install -m644 "$IMAGE" AnyKernel3/

          cd AnyKernel3
          zip -r9 -q kernel-${{ github.event.inputs.kernel_version }}-${{ github.event.inputs.manager }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: kernel-zip
          path: AnyKernel3/*.zip
