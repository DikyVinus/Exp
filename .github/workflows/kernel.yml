name: Build Kernel (GKI Sync)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        type: choice
        required: true
        options:
          - "5.10"
          - "6.1"
          - "6.6"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Select branch
        run: |
          if [ "${{ inputs.kernel_version }}" = "5.10" ]; then echo "BRANCH=common-android12-5.10" >> $GITHUB_ENV; fi
          if [ "${{ inputs.kernel_version }}" = "6.1" ]; then echo "BRANCH=common-android14-6.1" >> $GITHUB_ENV; fi
          if [ "${{ inputs.kernel_version }}" = "6.6" ]; then echo "BRANCH=common-android15-6.6" >> $GITHUB_ENV; fi

      - name: Init + sync GKI
        run: |
          mkdir kernel && cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b $BRANCH --depth=1
          repo sync -c -j$(nproc) --no-clone-bundle --no-tags

      - name: Replace common kernel with custom source
        run: |
          rm -rf kernel/common
          cp -a src/${{ inputs.kernel_version }} kernel/common

      - name: Build GKI
        run: |
          cd kernel
          export BUILD_CONFIG=common/build.config.gki.aarch64
          build/build.sh

      - name: Pack AnyKernel3
        run: |
          git clone --depth=1 https://github.com/DikyVinus/AnyKernel3 ak3
          cp $(find kernel -name Image | head -n1) ak3/
          cd ak3
          zip -r kernel.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: ak3/kernel.zip
