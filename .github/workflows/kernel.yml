name: Kernel Build

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        type: choice
        required: true
        options: ["5.10", "6.1", "6.6"]
      manager:
        type: choice
        required: true
        options:
          - KernelSU
          - KowSU
          - KernelSU-Next
          - ResukiSU
          - Rissu
          - Wild_KSU
      manager_commit:
        required: false
        default: ""
      susfs:
        type: choice
        required: true
        options: ["yes", "no"]
      susfs_commit:
        required: false
        default: ""
      lto_mode:
        type: choice
        required: true
        options: ["thin", "full", "none"]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      USE_CCACHE: 1
      CC: "ccache clang"

    steps:
      - run: |
          set -euo pipefail
          echo 'precedence ::ffff:0:0/96 100' | sudo tee -a /etc/gai.conf
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          git config --global protocol.version 2
          git config --global fetch.parallel $(nproc)
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends git repo rsync zip curl ccache ca-certificates

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - run: |
          set -euo pipefail
          git -c submodule.fetchJobs=$(nproc) submodule update \
            --init --depth=1 --filter=blob:none \
            src/${{ github.event.inputs.kernel_version }} \
            manager/${{ github.event.inputs.manager }}

      - if: ${{ github.event.inputs.manager_commit != '' }}
        run: |
          set -euo pipefail
          cd manager/${{ github.event.inputs.manager }}
          git fetch origin ${{ github.event.inputs.manager_commit }} --depth=1
          git checkout --detach ${{ github.event.inputs.manager_commit }}

      - id: vars
        run: |
          case "${{ github.event.inputs.kernel_version }}" in
            5.10) echo "branch=common-android12-5.10" >> $GITHUB_OUTPUT; echo "android=android12" >> $GITHUB_OUTPUT ;;
            6.1)  echo "branch=common-android14-6.1" >> $GITHUB_OUTPUT; echo "android=android14" >> $GITHUB_OUTPUT ;;
            6.6)  echo "branch=common-android15-6.6" >> $GITHUB_OUTPUT; echo "android=android15" >> $GITHUB_OUTPUT ;;
          esac

      - uses: actions/cache@v4
        with:
          path: kernel/.repo
          key: repo-${{ steps.vars.outputs.branch }}

      - run: |
          set -euo pipefail
          mkdir -p kernel && cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b ${{ steps.vars.outputs.branch }} --depth=1
          mkdir -p .repo/local_manifests
          echo '<manifest><remove-project name="kernel/common" /></manifest>' > .repo/local_manifests/remove-common.xml
          repo sync -c -j$(nproc) --optimized-fetch --no-clone-bundle --prune --fail-fast

      - run: |
          set -euo pipefail
          rsync -a --delete --no-inc-recursive \
            src/${{ github.event.inputs.kernel_version }}/ kernel/common/

      - uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ github.event.inputs.kernel_version }}

      - run: |
          set -euo pipefail

          cd kernel/common
          bash ../../manager/${{ github.event.inputs.manager }}/kernel/setup.sh
          test -f drivers/kernelsu/ksu.c

          if [ "${{ github.event.inputs.susfs }}" = "yes" ]; then
            cd $GITHUB_WORKSPACE
            B="gki-${{ steps.vars.outputs.android }}-${{ github.event.inputs.kernel_version }}"
            git clone --depth=1 -b "$B" https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu

            if [ -n "${{ github.event.inputs.susfs_commit }}" ]; then
              cd susfs4ksu
              git fetch origin ${{ github.event.inputs.susfs_commit }} --depth=1
              git checkout --detach ${{ github.event.inputs.susfs_commit }}
              cd ..
            fi

            cd kernel/common
            cp ../../susfs4ksu/kernel_patches/fs/* fs/
            cp ../../susfs4ksu/kernel_patches/include/linux/* include/linux/
            patch -p1 < ../../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ steps.vars.outputs.android }}-${{ github.event.inputs.kernel_version }}.patch
          fi

          cd ..

          KCONFIG_EXT=""

          if [ "${{ github.event.inputs.susfs }}" = "yes" ]; then
            KCONFIG_EXT+=" CONFIG_KSU_SUSFS=y"
            KCONFIG_EXT+=" CONFIG_KSU_SUSFS_SUS_PATH=y"
            KCONFIG_EXT+=" CONFIG_KSU_SUSFS_SUS_MOUNT=y"
            KCONFIG_EXT+=" CONFIG_KSU_SUSFS_SUS_KSTAT=y"
            KCONFIG_EXT+=" CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
            KCONFIG_EXT+=" CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
            KCONFIG_EXT+=" CONFIG_KSU_SUSFS_SUS_MAP=y"
          fi

          case "${{ github.event.inputs.lto_mode }}" in
            thin)
              KCONFIG_EXT+=" CONFIG_LTO_CLANG=y CONFIG_LTO_CLANG_THIN=y CONFIG_LTO_CLANG_FULL=n"
              ;;
            full)
              KCONFIG_EXT+=" CONFIG_LTO_CLANG=y CONFIG_LTO_CLANG_FULL=y CONFIG_LTO_CLANG_THIN=n"
              ;;
            none)
              KCONFIG_EXT+=" CONFIG_LTO_CLANG=n CONFIG_LTO_CLANG_THIN=n CONFIG_LTO_CLANG_FULL=n"
              ;;
          esac

          export KCONFIG_EXT
          export ARCH=arm64

          ccache -M 5G

          export BUILD_CONFIG=common/build.config.gki.aarch64
          export OUT_DIR=$(pwd)/out
          export MAKEFLAGS="-j$(nproc)"
          export NINJA_ARGS="-j$(nproc)"

          bash build/build.sh

      - run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/DikyVinus/AnyKernel3 AnyKernel3
          IMAGE=$(find kernel/out -name "Image*" -print -quit)
          install -m644 "$IMAGE" AnyKernel3/
          cd AnyKernel3
          zip -r9 -q -x '*.git*' -x '*.md' kernel-${{ github.event.inputs.kernel_version }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: AnyKernel3/*.zip
