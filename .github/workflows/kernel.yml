name: Kernel Build

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        type: choice
        required: true
        options: ["5.10","6.1","6.6"]
      kernel_commit:
        required: true
      manager:
        type: choice
        required: true
        options:
          - KernelSU
          - KowSU
          - KernelSU-Next
          - ResukiSU
          - Rissu
          - Wild_KSU
      manager_commit:
        required: true
      lto_mode:
        type: choice
        required: true
        options: ["thin","full","none"]

jobs:
  build:
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash -euo pipefail {0}

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      USE_CCACHE: 1

    steps:
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            git repo rsync zip ccache ca-certificates

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - run: |
          git submodule update --init --depth=1 manager/${{ github.event.inputs.manager }}

      - run: |
          cd manager/${{ github.event.inputs.manager }}
          git fetch origin ${{ github.event.inputs.manager_commit }} --depth=1
          git checkout --detach ${{ github.event.inputs.manager_commit }}

      - id: vars
        run: |
          case "${{ github.event.inputs.kernel_version }}" in
            5.10) echo "branch=common-android12-5.10" >> $GITHUB_OUTPUT ;;
            6.1)  echo "branch=common-android14-6.1" >> $GITHUB_OUTPUT ;;
            6.6)  echo "branch=common-android15-6.6" >> $GITHUB_OUTPUT ;;
          esac

      - run: |
          mkdir -p kernel
          cd kernel

          repo init -u https://android.googlesource.com/kernel/manifest \
            -b ${{ steps.vars.outputs.branch }} --depth=1

          mkdir -p .repo/local_manifests
          echo '<manifest><remove-project name="kernel/common" /></manifest>' > .repo/local_manifests/remove-common.xml

          repo sync -c -j$(nproc) \
            --optimized-fetch \
            --no-clone-bundle \
            --prune \
            --fail-fast

          repo manifest -r -o pinned.xml

          cd common
          git fetch origin ${{ github.event.inputs.kernel_commit }} --depth=1
          git checkout --detach ${{ github.event.inputs.kernel_commit }}
          cd ..

      - uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ github.event.inputs.kernel_commit }}
          restore-keys: |
            ccache-

      - run: |
          cd kernel/common

          bash ../../manager/${{ github.event.inputs.manager }}/kernel/setup.sh
          test -f drivers/kernelsu/ksu.c

          cd ..

          export ARCH=arm64
          make -C common O=out gki_defconfig

          FRAGMENT=common/fragment.config
          : > "$FRAGMENT"

          echo "CONFIG_KSU=y" >> "$FRAGMENT"

          case "${{ github.event.inputs.lto_mode }}" in
            thin)
              printf "CONFIG_LTO_CLANG=y\nCONFIG_LTO_CLANG_THIN=y\n# CONFIG_LTO_CLANG_FULL is not set\n" >> "$FRAGMENT"
              ;;
            full)
              printf "CONFIG_LTO_CLANG=y\nCONFIG_LTO_CLANG_FULL=y\n# CONFIG_LTO_CLANG_THIN is not set\n" >> "$FRAGMENT"
              ;;
            none)
              printf "# CONFIG_LTO_CLANG is not set\n# CONFIG_LTO_CLANG_THIN is not set\n# CONFIG_LTO_CLANG_FULL is not set\n" >> "$FRAGMENT"
              ;;
          esac

          if [ -f common/scripts/kconfig/merge_config.sh ]; then
            KCFG=common/scripts/kconfig/merge_config.sh
          else
            KCFG=common/scripts/kconfig/merge_config
          fi

          bash "$KCFG" -m -O common/out \
            common/arch/arm64/configs/gki_defconfig \
            "$FRAGMENT"

          make -C common O=out olddefconfig

          CFG=common/out/.config

          grep "^CONFIG_KSU=y" "$CFG"

          case "${{ github.event.inputs.lto_mode }}" in
            thin)
              grep "^CONFIG_LTO_CLANG=y" "$CFG"
              grep "^CONFIG_LTO_CLANG_THIN=y" "$CFG"
              ;;
            full)
              grep "^CONFIG_LTO_CLANG=y" "$CFG"
              grep "^CONFIG_LTO_CLANG_FULL=y" "$CFG"
              ;;
            none)
              grep "^# CONFIG_LTO_CLANG is not set" "$CFG"
              ;;
          esac

          ccache -M 5G

          export BUILD_CONFIG=common/build.config.gki.aarch64
          export OUT_DIR=$(pwd)/out
          export MAKEFLAGS="-j$(nproc)"
          export NINJA_ARGS="-j$(nproc)"

          bash build/build.sh

          IMAGE=$(find out -name "Image*" -print -quit)
          [ -n "$IMAGE" ]

          SIZE=$(stat -c%s "$IMAGE")
          [ "$SIZE" -gt 10000000 ]

      - run: |
          git clone --depth=1 https://github.com/DikyVinus/AnyKernel3 AnyKernel3
          IMAGE=$(find kernel/out -name "Image*" -print -quit)
          install -m644 "$IMAGE" AnyKernel3/
          cd AnyKernel3
          zip -r9 -q kernel-${{ github.event.inputs.kernel_commit }}-${{ github.event.inputs.manager_commit }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: AnyKernel3/*.zip
