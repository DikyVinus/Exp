name: Build Kernel (GKI LTS)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        type: choice
        required: true
        options: ["5.10", "6.1", "6.6"]
      manager:
        type: choice
        required: true
        options: ["Vanilla", "KernelSU-Next", "KernelSU", "KowSU", "ResukiSU", "Rissu", "Wild_KSU"]
        default: "Vanilla"
      lto:
        type: choice
        required: true
        options: ["thin", "full", "none"]
        default: "thin"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Set Variables
        run: |
          echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV
          case "${{ inputs.kernel_version }}" in
            5.10) echo "BRANCH=common-android12-5.10-lts" >> $GITHUB_ENV ;;
            6.1)  echo "BRANCH=common-android14-6.1-lts" >> $GITHUB_ENV ;;
            6.6)  echo "BRANCH=common-android15-6.6-lts" >> $GITHUB_ENV ;;
          esac

      - name: Install repo
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync Source
        run: |
          mkdir kernel && cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b $BRANCH --depth=1 --quiet
          repo sync -c -j$(nproc) --force-sync --no-tags --no-clone-bundle --optimized-fetch --current-branch

      - name: Init Manager
        if: ${{ inputs.manager != 'Vanilla' }}
        run: |
          git submodule update --init --depth 1 --single-branch manager/${{ inputs.manager }}
          MANAGER_PATH="${{ github.workspace }}/manager/${{ inputs.manager }}"
          cd kernel/common
          if [ -f "$MANAGER_PATH/kernel/setup.sh" ]; then
            bash "$MANAGER_PATH/kernel/setup.sh"
          else
            bash "$MANAGER_PATH/setup.sh"
          fi
          git config --global user.email "bot@github.com"
          git config --global user.name "Workflow Bot"
          git add .
          git commit -m "Integrate ${{ inputs.manager }} and remove dirty tag"

      - name: Build Kernel
        run: |
          cd kernel
          export BUILD_CONFIG=common/build.config.gki.aarch64
          export LTO=${{ inputs.lto }}
          export SKIP_MRPROPER=1
          export SKIP_CP_KERNEL_HDRS=1
          export SKIP_UNSTRIPPED_MODULES=1
          export SKIP_DEBUG_INFO=1
          JOBS=$(nproc)
          [ "${{ inputs.lto }}" = "full" ] && JOBS=1
          bash build/build.sh -j${JOBS}

      - name: Package
        run: |
          UPSTREAM=$(head -n 4 kernel/common/Makefile | awk '{print $3}' | paste -sd '.' -)
          echo "UPSTREAM_VER=$UPSTREAM" >> $GITHUB_ENV
          FINAL_NAME="v${UPSTREAM}-${{ inputs.manager }}-${{ env.DATE }}"
          echo "FINAL_NAME=$FINAL_NAME" >> $GITHUB_ENV
          mkdir ak3_work
          cp -r .github/patches/anykernel3/* ak3_work/
          cp kernel/out/*/dist/Image ak3_work/
          cd ak3_work
          zip -r9 "../$FINAL_NAME.zip" *
          cd ..
          mkdir -p out/
          cp kernel/out/*/dist/Image out/Image-$FINAL_NAME

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FINAL_NAME }}
          name: ${{ env.FINAL_NAME }}
          files: |
            *.zip
            out/Image-*
          body: |
            - Upstream: ${{ env.UPSTREAM_VER }}
            - Manager: ${{ inputs.manager }}
            - LTO: ${{ inputs.lto }}
            - Date: ${{ env.DATE }}
