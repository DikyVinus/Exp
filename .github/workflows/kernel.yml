name: Build Kernel (GKI LTS + DroidSpace + KernelSU Next)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        type: choice
        required: true
        options:
          - "5.10"
          - "6.1"
          - "6.6"

      droidspace:
        type: boolean
        required: true
        default: false

      kernelsu:
        type: boolean
        required: true
        default: false

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Set GKI branch
        run: |
          case "${{ inputs.kernel_version }}" in
            "5.10")
              echo "BRANCH=common-android12-5.10-lts" >> $GITHUB_ENV
              ;;
            "6.1")
              echo "BRANCH=common-android14-6.1-lts" >> $GITHUB_ENV
              ;;
            "6.6")
              echo "BRANCH=common-android15-6.6-lts" >> $GITHUB_ENV
              ;;
          esac

      - name: Sync GKI source
        run: |
          mkdir -p kernel
          cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b $BRANCH --depth=1
          repo sync -c -j$(nproc) --no-clone-bundle --no-tags

      # ----------------------------
      # CLEAN STATE
      # ----------------------------
      - name: Clean kernel tree
        run: |
          cd kernel/common
          make mrproper
          rm -rf ../out

      # ----------------------------
      # DROIDSPACE PATCH
      # ----------------------------
      - name: Apply DroidSpace patch (5.10 only)
        if: ${{ inputs.droidspace == true && inputs.kernel_version == '5.10' }}
        run: |
          cd kernel/common

          curl -sSL -o droidspace.patch \
            https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch

          patch -p1 --forward < droidspace.patch

      # ----------------------------
      # KERNELSU NEXT
      # ----------------------------
      - name: Apply KernelSU Next
        if: ${{ inputs.kernelsu == true }}
        run: |
          cd kernel/common
          git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git ksu-next
          bash ksu-next/kernel/setup.sh

      # ----------------------------
      # CONFIG (CORRECT GKI METHOD)
      # ----------------------------
      - name: Apply kernel config safely
        run: |
          cd kernel/common

          echo "Preparing O build dir..."
          export O=../out/android-${{ inputs.kernel_version }}-gki
          mkdir -p $O

          echo "Generating base defconfig..."
          make O=$O ARCH=arm64 gki_defconfig

          echo "Applying kernel config options safely..."

          scripts/config --file $O/.config --enable SYSVIPC
          scripts/config --file $O/.config --enable DEVTMPFS
          scripts/config --file $O/.config --enable PID_NS
          scripts/config --file $O/.config --enable POSIX_MQUEUE
          scripts/config --file $O/.config --enable NETFILTER_XT_TARGET_REJECT
          scripts/config --file $O/.config --enable NETFILTER_XT_TARGET_LOG
          scripts/config --file $O/.config --enable NETFILTER_XT_MATCH_RECENT

          echo "Syncing config..."
          make O=$O ARCH=arm64 olddefconfig

      # ----------------------------
      # BUILD
      # ----------------------------
      - name: Build kernel
        run: |
          cd kernel
          export BUILD_CONFIG=common/build.config.gki.aarch64
          build/build.sh

      # ----------------------------
      # PACK
      # ----------------------------
      - name: Pack AnyKernel3
        run: |
          git clone --depth=1 https://github.com/DikyVinus/AnyKernel3 ak3
          cp $(find kernel -name Image | head -n1) ak3/
          cd ak3
          zip -r kernel.zip .

      # ----------------------------
      # UPLOAD
      # ----------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: ak3/kernel.zip
