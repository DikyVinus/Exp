name: Google Kernel + AK3 Build

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel version"
        required: true
        type: choice
        options:
          - "5.10"
          - "6.1"
          - "6.6"
      manager:
        description: "KSU manager"
        required: true
        type: choice
        options:
          - "KernelSU"
          - "KowSU"
          - "KernelSU-Next"
          - "ResukiSU"
          - "Rissu"
          - "Wild_KSU"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: false
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable firefox postgresql* temurin-* mysql* dotnet-sdk-*"
          remove_packages_one_command: true

      - name: Force IPv4
        run: |
          echo 'precedence ::ffff:0:0/96 100' | sudo tee -a /etc/gai.conf
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1

      - name: Configure git
        run: |
          git config --global protocol.version 2
          git config --global core.compression 0

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git repo zip curl ccache rsync

      - name: Init submodules
        run: |
          git -c submodule.fetchJobs=1 submodule update \
            --init --depth=1 --filter=blob:none \
            src/${{ github.event.inputs.kernel_version }}

          git -c submodule.fetchJobs=1 submodule update \
            --init --depth=1 --filter=blob:none \
            manager/${{ github.event.inputs.manager }}

      - name: Select branch
        id: branch
        run: |
          case "${{ github.event.inputs.kernel_version }}" in
            "5.10") echo "branch=common-android12-5.10" >> $GITHUB_OUTPUT ;;
            "6.1")  echo "branch=common-android14-6.1" >> $GITHUB_OUTPUT ;;
            "6.6")  echo "branch=common-android15-6.6" >> $GITHUB_OUTPUT ;;
          esac

      - name: Prepare kernel
        run: mkdir -p kernel

      - name: Cache repo
        uses: actions/cache@v4
        with:
          path: kernel/.repo
          key: repo-${{ steps.branch.outputs.branch }}

      - name: Sync Google kernel
        run: |
          cd kernel
          repo init \
            -u https://android.googlesource.com/kernel/manifest \
            -b ${{ steps.branch.outputs.branch }} \
            --depth=1 || true

          export REPO_SYNC_FORCE_IPV4=1

          repo sync -c -j4 \
            --optimized-fetch \
            --no-clone-bundle \
            --prune \
            --fail-fast

      - name: Replace kernel/common
        run: |
          rsync -a --delete src/${{ github.event.inputs.kernel_version }}/ kernel/common/

      - name: Force ThinLTO
        run: |
          set -e
          DEFCONFIG=$(find kernel/common -type f -path "*/arch/arm64/configs/gki_defconfig" | head -n1)
          [ -z "$DEFCONFIG" ] && exit 1

          sed -i 's/^CONFIG_LTO_CLANG_FULL=y/# CONFIG_LTO_CLANG_FULL is not set/' "$DEFCONFIG"

          grep -q '^CONFIG_LTO_CLANG_THIN=y' "$DEFCONFIG" || echo 'CONFIG_LTO_CLANG_THIN=y' >> "$DEFCONFIG"
          grep -q '^CONFIG_LTO_CLANG=y' "$DEFCONFIG" || echo 'CONFIG_LTO_CLANG=y' >> "$DEFCONFIG"
          grep -q '^CONFIG_CFI_CLANG=y' "$DEFCONFIG" || echo 'CONFIG_CFI_CLANG=y' >> "$DEFCONFIG"

      - name: Apply KSU
        run: |
          cd kernel/common
          bash ../../manager/${{ github.event.inputs.manager }}/kernel/setup.sh

      - name: Setup ccache
        run: |
          export USE_CCACHE=1
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          ccache -M 5G

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ github.event.inputs.kernel_version }}

      - name: Build kernel
        run: |
          cd kernel
          export USE_CCACHE=1
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          export BUILD_CONFIG=common/build.config.gki.aarch64
          export OUT_DIR=$(pwd)/out
          bash build/build.sh

      - name: Prepare AnyKernel3 + copy image
        run: |
          set -e

          git clone --depth=1 --filter=blob:none https://github.com/DikyVinus/AnyKernel3 AnyKernel3

          IMAGE=$(find kernel/out/dist -type f -name "Image*" | head -n1)

          if [ -z "$IMAGE" ]; then
            echo "Image not found in dist, fallback search"

            IMAGE=$(find kernel/out -type f \( -name "Image" -o -name "Image.gz" -o -name "Image.lz4" \) | head -n1)
          fi

          if [ -z "$IMAGE" ]; then
            echo "kernel image not found"
            exit 1
          fi

          echo "Using $IMAGE"
          cp "$IMAGE" AnyKernel3/

      - name: Zip
        run: |
          cd AnyKernel3
          zip -r9 kernel-${{ github.event.inputs.kernel_version }}-${{ github.event.inputs.manager }}.zip *

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: kernel-zip
          path: AnyKernel3/*.zip
