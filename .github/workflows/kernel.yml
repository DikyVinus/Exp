name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Android common kernel version"
        required: true
        type: choice
        options: ["5.10", "6.1", "6.6"]

      manager:
        description: "Root manager"
        required: true
        type: choice
        default: Vanilla
        options:
          - Vanilla
          - KernelSU
          - KowSU
          - KernelSU-Next
          - ResukiSU
          - Rissu
          - Wild_KSU

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: Setup host
        run: |
          echo 'precedence ::ffff:0:0/96 100' | sudo tee -a /etc/gai.conf
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1 || true

          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            git curl wget zip unzip repo \
            bc bison flex libssl-dev libelf-dev python3 \
            dwarves pahole file xz-utils zstd rsync patch make

          mkdir -p ~/bin
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> "$GITHUB_PATH"

          echo "JOBS=$(nproc)" >> "$GITHUB_ENV"

      - name: Check out workflow repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Init needed submodules
        run: |
          git submodule update --init --depth=1 "src/${{ inputs.kernel_version }}"

          if [ "${{ inputs.manager }}" != "Vanilla" ]; then
            git submodule update --init --depth=1 "manager/${{ inputs.manager }}"
          fi

      - name: Resolve Android branch
        id: vars
        run: |
          case "${{ inputs.kernel_version }}" in
            5.10)
              echo "branch=common-android12-5.10" >> "$GITHUB_OUTPUT"
              ;;
            6.1)
              echo "branch=common-android14-6.1" >> "$GITHUB_OUTPUT"
              ;;
            6.6)
              echo "branch=common-android15-6.6" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported kernel version"
              exit 1
              ;;
          esac

      - name: Init Android kernel repo
        run: |
          mkdir -p kernel
          cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b "${{ steps.vars.outputs.branch }}"

      - name: Sync kernel sources
        working-directory: kernel
        run: |
          REPO_SYNC_FORCE_IPV4=1 repo sync -c -j"$((JOBS * 2))" \
            --optimized-fetch --prune --fail-fast \
            --no-tags --current-branch

      - name: Replace kernel/common with custom source
        run: |
          test -d "src/${{ inputs.kernel_version }}"
          test -f "src/${{ inputs.kernel_version }}/Makefile"

          rm -rf kernel/common
          ln -s "$GITHUB_WORKSPACE/src/${{ inputs.kernel_version }}" kernel/common

          test -L kernel/common
          test -f kernel/common/Makefile

      - name: Apply manager patches
        if: ${{ inputs.manager != 'Vanilla' }}
        run: |
          test -f "manager/${{ inputs.manager }}/kernel/setup.sh"

          pushd kernel/common
          bash "${GITHUB_WORKSPACE}/manager/${{ inputs.manager }}/kernel/setup.sh"
          popd

      - name: Configure kernel
        run: |
          OUT_DIR="$GITHUB_WORKSPACE/kernel/out"
          make -C kernel/common O="$OUT_DIR" ARCH=arm64 gki_defconfig
          yes "" | make -C kernel/common O="$OUT_DIR" ARCH=arm64 olddefconfig || true

      - name: Build kernel
        working-directory: kernel
        run: |
          export KERNEL_DIR=common
          export BUILD_CONFIG=common/build.config.gki.aarch64
          export OUT_DIR="$PWD/out"
          export DIST_DIR="$PWD/out/dist"
          export MAKEFLAGS="-j$JOBS"
          export NINJA_ARGS="-j$JOBS"

          bash build/build.sh

      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/DikyVinus/AnyKernel3 ak3

          IMG="$(find kernel/out -type f \( -name 'Image' -o -name 'Image.gz' \) | head -n1)"
          test -n "$IMG"

          install -m644 "$IMG" ak3/
          cd ak3
          zip -r9 -q "kernel-${{ inputs.kernel_version }}-${{ inputs.manager }}.zip" .

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: ak3/*.zip
