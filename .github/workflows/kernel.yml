name: Google Kernel + AK3 Build

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel version"
        required: true
        type: choice
        options:
          - "5.10"
          - "6.1"
          - "6.6"
      manager:
        description: "KSU manager"
        required: true
        type: choice
        options:
          - "KernelSU"
          - "KowSU"
          - "KernelSU-Next"
          - "ResukiSU"
          - "Rissu"
          - "Wild_KSU"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Force IPv4
        run: |
          echo 'precedence ::ffff:0:0/96 100' | sudo tee -a /etc/gai.conf
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1

      - name: Configure git
        run: |
          git config --global protocol.version 2
          git config --global core.compression 0

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git repo zip curl ccache rsync

      - name: Init submodules
        run: |
          git -c submodule.fetchJobs=1 submodule update \
            --init --depth=1 --filter=blob:none \
            src/${{ github.event.inputs.kernel_version }}

          git -c submodule.fetchJobs=1 submodule update \
            --init --depth=1 --filter=blob:none \
            manager/${{ github.event.inputs.manager }}

      - name: Select branch + android version
        id: vars
        run: |
          case "${{ github.event.inputs.kernel_version }}" in
            "5.10") echo "branch=common-android12-5.10" >> $GITHUB_OUTPUT; echo "android=android12" >> $GITHUB_OUTPUT ;;
            "6.1")  echo "branch=common-android14-6.1" >> $GITHUB_OUTPUT; echo "android=android14" >> $GITHUB_OUTPUT ;;
            "6.6")  echo "branch=common-android15-6.6" >> $GITHUB_OUTPUT; echo "android=android15" >> $GITHUB_OUTPUT ;;
          esac

      - name: Prepare kernel
        run: mkdir -p kernel

      - name: Cache repo
        uses: actions/cache@v4
        with:
          path: kernel/.repo
          key: repo-${{ steps.vars.outputs.branch }}

      - name: Init repo (no common)
        run: |
          cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b ${{ steps.vars.outputs.branch }} --depth=1 || true

          mkdir -p .repo/local_manifests
          echo '<manifest><remove-project name="kernel/common" /></manifest>' \
            > .repo/local_manifests/remove-common.xml

      - name: Sync repo
        run: |
          cd kernel
          export REPO_SYNC_FORCE_IPV4=1
          repo sync -c -j4 --optimized-fetch --no-clone-bundle --prune --fail-fast

      - name: Inject kernel source
        run: |
          rsync -a src/${{ github.event.inputs.kernel_version }}/ kernel/common/

      # --- SUSFS ---
      - name: Setup + apply SUSFS
        run: |
          set -e

          SUSFS_BRANCH="gki-${{ steps.vars.outputs.android }}-${{ github.event.inputs.kernel_version }}"
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_BRANCH" --depth=1 susfs4ksu

          cd kernel/common

          cp ../../susfs4ksu/kernel_patches/fs/* fs/
          cp ../../susfs4ksu/kernel_patches/include/linux/* include/linux/

          cp ../../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ steps.vars.outputs.android }}-${{ github.event.inputs.kernel_version }}.patch ./
          patch -p1 < 50_add_susfs_in_gki-${{ steps.vars.outputs.android }}-${{ github.event.inputs.kernel_version }}.patch || true

      - name: Enable SUSFS + LTO config (safe patch)
        run: |
          set -e

          DEFCONFIG=$(find kernel/common -type f -path "*/arch/arm64/configs/gki_defconfig" | head -n1)
          [ -z "$DEFCONFIG" ] && exit 1

          add_cfg() {
            KEY="$1"
            if grep -q "^$KEY=" "$DEFCONFIG"; then
              sed -i "s/^$KEY=.*/$KEY=y/" "$DEFCONFIG"
            elif grep -q "^# $KEY is not set" "$DEFCONFIG"; then
              sed -i "s/^# $KEY is not set/$KEY=y/" "$DEFCONFIG"
            else
              echo "$KEY=y" >> "$DEFCONFIG"
            fi
          }

          # SUSFS
          add_cfg CONFIG_KSU_SUSFS
          add_cfg CONFIG_KSU_SUSFS_SUS_PATH
          add_cfg CONFIG_KSU_SUSFS_SUS_MOUNT
          add_cfg CONFIG_KSU_SUSFS_SUS_KSTAT
          add_cfg CONFIG_KSU_SUSFS_SPOOF_UNAME
          add_cfg CONFIG_KSU_SUSFS_OPEN_REDIRECT
          add_cfg CONFIG_KSU_SUSFS_SUS_MAP

          # LTO
          sed -i 's/^CONFIG_LTO_CLANG_FULL=y/# CONFIG_LTO_CLANG_FULL is not set/' "$DEFCONFIG"
          add_cfg CONFIG_LTO_CLANG
          add_cfg CONFIG_LTO_CLANG_THIN

      # --- KSU LAST ---
      - name: Apply KSU
        run: |
          cd kernel/common
          bash ../../manager/${{ github.event.inputs.manager }}/kernel/setup.sh

      - name: Setup ccache
        run: |
          export USE_CCACHE=1
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          ccache -M 5G

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ github.event.inputs.kernel_version }}

      - name: Build kernel
        run: |
          cd kernel
          export USE_CCACHE=1
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          export BUILD_CONFIG=common/build.config.gki.aarch64
          export OUT_DIR=$(pwd)/out
          bash build/build.sh

      - name: Prepare AnyKernel3 + copy image
        run: |
          set -e
          git clone --depth=1 --filter=blob:none https://github.com/DikyVinus/AnyKernel3 AnyKernel3

          IMAGE=$(find kernel/out/dist -type f -name "Image*" | head -n1)
          [ -z "$IMAGE" ] && IMAGE=$(find kernel/out -type f -name "Image*" | head -n1)
          [ -z "$IMAGE" ] && exit 1

          cp "$IMAGE" AnyKernel3/

      - name: Zip
        run: |
          cd AnyKernel3
          zip -r9 kernel-${{ github.event.inputs.kernel_version }}-${{ github.event.inputs.manager }}.zip *

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: kernel-zip
          path: AnyKernel3/*.zip
