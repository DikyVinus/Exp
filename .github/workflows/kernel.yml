name: Build Kernel (GKI LTS + DroidSpace + KernelSU Next)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        type: choice
        required: true
        options: ["5.10", "6.1", "6.6"]

      droidspace:
        type: boolean
        required: true
        default: false

      kernelsu:
        type: boolean
        required: true
        default: false

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Cache repo
        uses: actions/cache@v4
        with:
          path: kernel/.repo
          key: repo-${{ inputs.kernel_version }}

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Set GKI branch
        run: |
          case "${{ inputs.kernel_version }}" in
            5.10) echo "BRANCH=common-android12-5.10-lts" >> $GITHUB_ENV ;;
            6.1)  echo "BRANCH=common-android14-6.1-lts" >> $GITHUB_ENV ;;
            6.6)  echo "BRANCH=common-android15-6.6-lts" >> $GITHUB_ENV ;;
          esac

      - name: Sync GKI source
        run: |
          mkdir -p kernel
          cd kernel

          repo init -u https://android.googlesource.com/kernel/manifest -b $BRANCH
          repo sync -c -j$(nproc) --no-clone-bundle --no-tags --force-sync --optimized-fetch --prune

      - name: Clean kernel tree
        run: |
          cd kernel/common
          make mrproper
          rm -rf ../out

      - name: Apply DroidSpace patch
        if: ${{ inputs.droidspace == true && inputs.kernel_version == '5.10' }}
        run: |
          cd kernel/common
          curl -sSL -o patch.patch https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch
          patch -p1 --forward --reject-file=- < patch.patch || true

      - name: Apply KernelSU Next
        if: ${{ inputs.kernelsu == true }}
        run: |
          cd kernel/common
          git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git ksu
          bash ksu/kernel/setup.sh || true

      - name: Generate defconfig
        run: |
          cd kernel/common
          export O=../out/android-${{ inputs.kernel_version }}-gki
          mkdir -p $O
          make O=$O ARCH=arm64 gki_defconfig

      - name: Apply kernel config (safe mode)
        run: |
          cd kernel/common

          export O=../out/android-${{ inputs.kernel_version }}-gki

          apply() {
            scripts/config --file $O/.config --enable "$1" || true
          }

          apply SYSVIPC
          apply DEVTMPFS
          apply PID_NS
          apply POSIX_MQUEUE
          apply IPC_NS
          apply UTS_NS
          apply NET_NS
          apply USER_NS
          apply CGROUP_PIDS
          apply TMPFS_XATTR

          apply NETFILTER_XT_TARGET_REJECT
          apply NETFILTER_XT_TARGET_LOG
          apply NETFILTER_XT_MATCH_RECENT
          apply TCP_CONG_BBR
          apply NET_SCH_FQ
          apply NET_SCH_FQ_CODEL

          make O=$O ARCH=arm64 olddefconfig || true

      - name: Verify applied config
        run: |
          cd kernel/common
          export O=../out/android-${{ inputs.kernel_version }}-gki

          echo "==== CONFIG CHECK ===="
          grep -E "SYSVIPC|DEVTMPFS|PID_NS|IPC_NS|NET_NS|USER_NS|CGROUP_PIDS|TMPFS_XATTR" $O/.config || true

          cp $O/.config $O/defconfig.final

      - name: Build kernel
        run: |
          cd kernel

          export MAKEFLAGS="-j$(nproc)"
          export BUILD_CONFIG=common/build.config.gki.aarch64
          export LTO=thin
          export LLVM=1
          export LLVM_IAS=1
          export KCFLAGS="-O2"
          export KBUILD_CFLAGS="-O2"

          build/build.sh

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/DikyVinus/AnyKernel3 ak3

          cp $(find kernel -name Image -type f | head -n1) ak3/

          cd ak3
          zip -r kernel-${{ inputs.kernel_version }}-${{ github.run_number }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ inputs.kernel_version }}-${{ github.run_number }}
          path: ak3/*.zip
