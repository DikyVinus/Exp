name: Google Kernel + AK3 Build

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel version"
        required: true
        type: choice
        options:
          - "5.10"
          - "6.1"
          - "6.6"

      manager:
        description: "KSU manager"
        required: true
        type: choice
        options:
          - "KernelSU"
          - "KernelSU-Next"
          - "ResukiSU"
          - "Rissu"
          - "Wild_KSU"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Force IPv4 + disable IPv6
        run: |
          echo 'precedence ::ffff:0:0/96  100' | sudo tee -a /etc/gai.conf
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1

      - name: Configure git/curl fail-fast
        run: |
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 5
          git config --global protocol.version 2
          git config --global core.compression 0

          echo "ipv4" >> ~/.curlrc
          echo "speed-limit = 1000" >> ~/.curlrc
          echo "speed-time = 5" >> ~/.curlrc

      - name: Checkout (no submodules)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git repo zip curl ccache

      - name: Init selected submodules
        run: |
          git submodule init src/${{ github.event.inputs.kernel_version }}
          git submodule update --depth=1 src/${{ github.event.inputs.kernel_version }}

          git submodule init manager/${{ github.event.inputs.manager }}
          git submodule update --depth=1 manager/${{ github.event.inputs.manager }}

      - name: Set manifest branch
        id: branch
        run: |
          case "${{ github.event.inputs.kernel_version }}" in
            "5.10") echo "branch=common-android13-5.10" >> $GITHUB_OUTPUT ;;
            "6.1")  echo "branch=common-android14-6.1" >> $GITHUB_OUTPUT ;;
            "6.6")  echo "branch=common-android15-6.6" >> $GITHUB_OUTPUT ;;
          esac

      - name: Prepare kernel dir
        run: mkdir -p kernel

      - name: Cache repo (.repo)
        uses: actions/cache@v4
        with:
          path: kernel/.repo
          key: repo-${{ steps.branch.outputs.branch }}

      - name: Init + sync Google kernel
        run: |
          cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b ${{ steps.branch.outputs.branch }} || true

          export GIT_HTTP_LOW_SPEED_LIMIT=1000
          export GIT_HTTP_LOW_SPEED_TIME=5
          export REPO_SYNC_FORCE_IPV4=1

          repo sync -c -j$(nproc) --fail-fast

      - name: Replace kernel/common
        run: |
          rm -rf kernel/common
          cp -r src/${{ github.event.inputs.kernel_version }} kernel/common

      - name: Apply KSU (selected manager only)
        run: |
          cd kernel/common
          bash ../../manager/${{ github.event.inputs.manager }}/setup.sh $(pwd)

      - name: Setup ccache
        run: |
          export USE_CCACHE=1
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          ccache -M 5G

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ github.event.inputs.kernel_version }}

      - name: Build kernel (Google build.sh)
        run: |
          cd kernel
          export USE_CCACHE=1
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          export BUILD_CONFIG=common/build.config.gki.aarch64
          export OUT_DIR=$(pwd)/out
          bash build/build.sh

      - name: Clone AnyKernel3
        run: |
          git clone --depth=1 https://github.com/DikyVinus/AnyKernel3 AnyKernel3

      - name: Copy kernel image
        run: |
          cp kernel/out/arch/arm64/boot/Image AnyKernel3/

      - name: Zip AnyKernel3
        run: |
          cd AnyKernel3
          zip -r9 kernel-${{ github.event.inputs.kernel_version }}-${{ github.event.inputs.manager }}.zip *

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: kernel-zip
          path: AnyKernel3/*.zip
