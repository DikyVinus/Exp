name: Build Kernel (GKI LTS)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        type: choice
        required: true
        options:
          - "5.10"
          - "6.1"
          - "6.6"

      droidspace:
        type: boolean
        required: true
        default: false

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install repo
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Set branch + Android version
        run: |
          case "${{ inputs.kernel_version }}" in
            "5.10")
              echo "BRANCH=common-android12-5.10-lts" >> $GITHUB_ENV
              echo "ANDROID_VER=android12" >> $GITHUB_ENV
              ;;
            "6.1")
              echo "BRANCH=common-android14-6.1-lts" >> $GITHUB_ENV
              echo "ANDROID_VER=android14" >> $GITHUB_ENV
              ;;
            "6.6")
              echo "BRANCH=common-android15-6.6-lts" >> $GITHUB_ENV
              echo "ANDROID_VER=android15" >> $GITHUB_ENV
              ;;
          esac

      - name: Sync GKI
        run: |
          mkdir kernel
          cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b $BRANCH --depth=1
          repo sync -c -j$(nproc) --no-clone-bundle --no-tags

      - name: Apply custom patches
        run: |
          if [ -d "$GITHUB_WORKSPACE/patches/custom" ]; then
            cd kernel/common
            git apply $GITHUB_WORKSPACE/patches/custom/*.patch || true
          fi

      - name: Apply DroidSpace patches
        if: ${{ inputs.droidspace == true }}
        run: |
          cd kernel/common

          PATCH_DIR="$GITHUB_WORKSPACE/patches/common/droidspaces"
          KERNEL_VER="${{ inputs.kernel_version }}"

          echo "Applying DroidSpace patches"

          if [ "$ANDROID_VER" = "android12" ] && [ "$KERNEL_VER" = "5.10" ]; then
            patch -p1 --forward < "$PATCH_DIR/fix_sysvipc_kabi_bypass_a16-6.12_below.patch"
            patch -p1 --forward < "$PATCH_DIR/fix_abi_padding_for_posix_mqueue.patch"
          else
            patch -p1 --forward < "$PATCH_DIR/fix_sysvipc_kabi_6_7_8.patch"
          fi

          patch -p1 --forward < "$PATCH_DIR/0001-Return-ghost-task-if-task-is-null-and-is-requested-b.patch"

          cat >> arch/arm64/configs/gki_defconfig <<'EOF'
CONFIG_SYSVIPC=y
CONFIG_DEVTMPFS=y
CONFIG_PID_NS=y
CONFIG_POSIX_MQUEUE=y
CONFIG_NETFILTER_XT_TARGET_REJECT=y
CONFIG_NETFILTER_XT_TARGET_LOG=y
CONFIG_NETFILTER_XT_MATCH_RECENT=y
EOF

      - name: Build kernel
        run: |
          cd kernel
          export BUILD_CONFIG=common/build.config.gki.aarch64
          build/build.sh

      - name: Pack AnyKernel3
        run: |
          git clone --depth=1 https://github.com/DikyVinus/AnyKernel3 ak3
          cp $(find kernel -name Image | head -n1) ak3/
          cd ak3
          zip -r kernel.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: ak3/kernel.zip
