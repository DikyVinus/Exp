name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        required: true
        type: choice
        options: ["5.10", "6.1", "6.6"]

      kernel_commit:
        required: false
        default: ""

      manager:
        required: true
        type: choice
        options:
          - KernelSU
          - KowSU
          - KernelSU-Next
          - ResukiSU
          - Rissu
          - Wild_KSU

      manager_commit:
        required: false
        default: ""

      lto_mode:
        required: true
        type: choice
        options: [thin, full, none]

      susfs:
        required: true
        type: choice
        options: ["yes", "no"]

      susfs_commit:
        required: false
        default: ""

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: Setup
        run: |
          echo 'precedence ::ffff:0:0/96 100' | sudo tee -a /etc/gai.conf
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1

          git config --global protocol.version 2
          git config --global core.compression 0
          git config --global fetch.parallel $(nproc)

          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            git zip curl ccache rsync ca-certificates \
            bc bison flex libssl-dev libelf-dev python3 dwarves

          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

          echo "JOBS=$(nproc)" >> $GITHUB_ENV
          echo "USE_CCACHE=1" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Submodules
        run: |
          git -c submodule.fetchJobs=$JOBS submodule update \
            --init --depth=1 --filter=blob:none \
            src/${{ inputs.kernel_version }} \
            manager/${{ inputs.manager }}

          [ -d manager/${{ inputs.manager }} ] || exit 1
          [ -d src/${{ inputs.kernel_version }} ] || exit 1

      - name: Override manager
        if: ${{ inputs.manager_commit != '' }}
        run: |
          cd manager/${{ inputs.manager }}
          git fetch origin ${{ inputs.manager_commit }} --depth=1
          git checkout --detach FETCH_HEAD

      - name: Resolve branch
        id: vars
        run: |
          case "${{ inputs.kernel_version }}" in
            5.10) A=android12 B=common-android12-5.10 ;;
            6.1)  A=android14 B=common-android14-6.1 ;;
            6.6)  A=android15 B=common-android15-6.6 ;;
          esac
          echo "android=$A" >> $GITHUB_OUTPUT
          echo "branch=$B" >> $GITHUB_OUTPUT

      - name: Init repo
        run: |
          mkdir -p kernel && cd kernel

          repo init -u https://android.googlesource.com/kernel/manifest \
            -b ${{ steps.vars.outputs.branch }}

          mkdir -p .repo/local_manifests
          echo '<manifest><remove-project name="kernel/common"/></manifest>' \
            > .repo/local_manifests/remove.xml

      - uses: actions/cache@v4
        with:
          path: kernel/.repo
          key: repo-${{ steps.vars.outputs.branch }}-${{ github.sha }}
          restore-keys: |
            repo-${{ steps.vars.outputs.branch }}-

      - name: Sync kernel
        run: |
          cd kernel
          REPO_SYNC_FORCE_IPV4=1 repo sync -c -j$JOBS \
            --optimized-fetch --no-clone-bundle --prune --fail-fast

      - name: Inject source
        run: |
          [ -d src/${{ inputs.kernel_version }} ] || exit 1
          rsync -a --delete src/${{ inputs.kernel_version }}/ kernel/common/

      - name: Override kernel commit
        if: ${{ inputs.kernel_commit != '' }}
        run: |
          cd kernel/common
          git fetch origin ${{ inputs.kernel_commit }} --depth=1
          git checkout --detach FETCH_HEAD

      - name: Apply patches
        run: |
          cd kernel/common
          bash ../../manager/${{ inputs.manager }}/kernel/setup.sh

          if [ "${{ inputs.susfs }}" = yes ]; then
            cd "$GITHUB_WORKSPACE"

            BR="gki-${{ steps.vars.outputs.android }}-${{ inputs.kernel_version }}"

            if [ -d susfs/.git ]; then
              cd susfs
              git fetch origin "$BR" --depth=1
              git checkout --force FETCH_HEAD
              cd ..
            else
              rm -rf susfs
              git clone --depth=1 -b "$BR" https://gitlab.com/simonpunk/susfs4ksu.git susfs
            fi

            if [ -n "${{ inputs.susfs_commit }}" ]; then
              cd susfs
              git fetch origin ${{ inputs.susfs_commit }} --depth=1
              git checkout --detach FETCH_HEAD
              cd ..
            fi

            cd kernel/common
            rsync -a ../../susfs/kernel_patches/fs/ fs/
            rsync -a ../../susfs/kernel_patches/include/linux/ include/linux/

            patch -p1 --forward \
              < ../../susfs/kernel_patches/50_add_susfs_in_$BR.patch || true
          fi

      - name: Configure
        run: |
          DEF=$(find kernel/common -path "*/arch/arm64/configs/gki_defconfig" -print -quit)
          [ -z "$DEF" ] && exit 1

          cfg() {
            sed -i "/^$1=/d;/^# $1 is not set/d" "$DEF"
            [ "$2" = y ] && echo "$1=y" >> "$DEF" || echo "# $1 is not set" >> "$DEF"
          }

          if [ "${{ inputs.susfs }}" = yes ]; then
            for c in CONFIG_KSU_SUSFS{,_SUS_PATH,_SUS_MOUNT,_SUS_KSTAT,_SPOOF_UNAME,_OPEN_REDIRECT,_SUS_MAP,_ENABLE_LOG,_HIDE_KSU_SUSFS_SYMBOLS,_SPOOF_CMDLINE_OR_BOOTCONFIG}; do
              cfg $c y
            done
          fi

          case "${{ inputs.lto_mode }}" in
            thin) cfg CONFIG_LTO_CLANG y; cfg CONFIG_LTO_CLANG_THIN y; cfg CONFIG_LTO_CLANG_FULL n ;;
            full) cfg CONFIG_LTO_CLANG y; cfg CONFIG_LTO_CLANG_FULL y; cfg CONFIG_LTO_CLANG_THIN n ;;
            none) cfg CONFIG_LTO_CLANG n; cfg CONFIG_LTO_CLANG_THIN n; cfg CONFIG_LTO_CLANG_FULL n ;;
          esac

          make -C kernel/common O=kernel/out ARCH=arm64 gki_defconfig

          export CCACHE_COMPRESS=1
          ccache -M 5G

      - uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ inputs.kernel_version }}-v3
          restore-keys: |
            ccache-${{ inputs.kernel_version }}-

      - name: Build
        run: |
          cd kernel
          export CC="ccache clang"
          export BUILD_CONFIG=common/build.config.gki.aarch64
          export OUT_DIR=$(pwd)/out
          export MAKEFLAGS="-j$JOBS"
          export NINJA_ARGS="-j$JOBS"
          bash build/build.sh

      - name: Package
        run: |
          git clone --depth=1 --filter=blob:none \
            https://github.com/DikyVinus/AnyKernel3 ak3

          IMG=$(find kernel/out -type f \( -name "Image" -o -name "Image.gz" \) | head -n1)
          [ -z "$IMG" ] && exit 1

          install -m644 "$IMG" ak3/
          cd ak3
          zip -r9 -q kernel-${{ inputs.kernel_version }}-${{ inputs.manager }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: ak3/*.zip
