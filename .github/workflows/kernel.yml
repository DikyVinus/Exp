name: Kernel Build

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        type: choice
        required: true
        options: ["5.10","6.1","6.6"]
      manager:
        type: choice
        required: true
        options:
          - KernelSU
          - KowSU
          - KernelSU-Next
          - ResukiSU
          - Rissu
          - Wild_KSU
      manager_commit:
        required: false
        default: ""
      susfs:
        type: choice
        required: true
        options: ["yes","no"]
      susfs_commit:
        required: false
        default: ""
      lto_mode:
        type: choice
        required: true
        options: ["thin","full","none"]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      USE_CCACHE: 1
      CC: "ccache clang"

    steps:
      - name: setup
        run: |
          set -euo pipefail
          echo 'precedence ::ffff:0:0/96 100' | sudo tee -a /etc/gai.conf
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          git config --global protocol.version 2
          git config --global fetch.parallel $(nproc)
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends git repo rsync zip curl ccache ca-certificates

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: submodules
        run: |
          set -euo pipefail
          git -c submodule.fetchJobs=$(nproc) submodule update \
            --init --depth=1 --filter=blob:none \
            src/${{ github.event.inputs.kernel_version }} \
            manager/${{ github.event.inputs.manager }}

      - name: manager pin
        if: ${{ github.event.inputs.manager_commit != '' }}
        run: |
          set -euo pipefail
          cd manager/${{ github.event.inputs.manager }}
          git fetch origin ${{ github.event.inputs.manager_commit }} --depth=1
          git checkout --detach ${{ github.event.inputs.manager_commit }}

      - name: vars
        id: vars
        run: |
          case "${{ github.event.inputs.kernel_version }}" in
            5.10) echo "branch=common-android12-5.10" >> $GITHUB_OUTPUT; echo "android=android12" >> $GITHUB_OUTPUT ;;
            6.1)  echo "branch=common-android14-6.1" >> $GITHUB_OUTPUT; echo "android=android14" >> $GITHUB_OUTPUT ;;
            6.6)  echo "branch=common-android15-6.6" >> $GITHUB_OUTPUT; echo "android=android15" >> $GITHUB_OUTPUT ;;
          esac

      - name: sync
        run: |
          set -euo pipefail
          mkdir -p kernel && cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b ${{ steps.vars.outputs.branch }} --depth=1
          mkdir -p .repo/local_manifests
          echo '<manifest><remove-project name="kernel/common" /></manifest>' > .repo/local_manifests/remove-common.xml
          repo sync -c -j$(nproc) --optimized-fetch --no-clone-bundle --prune --fail-fast

      - name: inject
        run: |
          set -euo pipefail
          rsync -a --delete src/${{ github.event.inputs.kernel_version }}/ kernel/common/

      - uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ github.event.inputs.kernel_version }}-prod
          restore-keys: |
            ccache-${{ github.event.inputs.kernel_version }}-

      - name: build
        run: |
          set -euo pipefail

          cd kernel/common
          bash ../../manager/${{ github.event.inputs.manager }}/kernel/setup.sh
          test -f drivers/kernelsu/ksu.c

          if [ "${{ github.event.inputs.susfs }}" = "yes" ]; then
            cd $GITHUB_WORKSPACE
            B="gki-${{ steps.vars.outputs.android }}-${{ github.event.inputs.kernel_version }}"
            git clone --depth=1 -b "$B" https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu

            if [ -n "${{ github.event.inputs.susfs_commit }}" ]; then
              cd susfs4ksu
              git fetch origin ${{ github.event.inputs.susfs_commit }} --depth=1
              git checkout --detach ${{ github.event.inputs.susfs_commit }}
              cd ..
            fi

            cd kernel/common
            cp ../../susfs4ksu/kernel_patches/fs/* fs/
            cp ../../susfs4ksu/kernel_patches/include/linux/* include/linux/
            patch -p1 < ../../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ steps.vars.outputs.android }}-${{ github.event.inputs.kernel_version }}.patch

            test -f fs/susfs.c

            if ! grep -R "config KSU_SUSFS" fs >/dev/null; then
              if [ -f fs/Kconfig.susfs ]; then
                grep -q 'Kconfig.susfs' fs/Kconfig || echo 'source "fs/Kconfig.susfs"' >> fs/Kconfig
              else
                echo "missing SUSFS Kconfig"
                exit 1
              fi
            fi
          fi

          cd ..

          export ARCH=arm64
          make -C common O=out gki_defconfig

          echo "CONFIG_KSU=y" > common/fragment.config

          if [ "${{ github.event.inputs.susfs }}" = "yes" ]; then
            echo "CONFIG_KSU_SUSFS=y" >> common/fragment.config
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> common/fragment.config
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> common/fragment.config
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> common/fragment.config
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> common/fragment.config
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> common/fragment.config
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> common/fragment.config
          fi

          if [ "${{ github.event.inputs.lto_mode }}" = "thin" ]; then
            echo "CONFIG_LTO_CLANG=y" >> common/fragment.config
            echo "CONFIG_LTO_CLANG_THIN=y" >> common/fragment.config
            echo "# CONFIG_LTO_CLANG_FULL is not set" >> common/fragment.config
          elif [ "${{ github.event.inputs.lto_mode }}" = "full" ]; then
            echo "CONFIG_LTO_CLANG=y" >> common/fragment.config
            echo "CONFIG_LTO_CLANG_FULL=y" >> common/fragment.config
            echo "# CONFIG_LTO_CLANG_THIN is not set" >> common/fragment.config
          else
            echo "# CONFIG_LTO_CLANG is not set" >> common/fragment.config
            echo "# CONFIG_LTO_CLANG_THIN is not set" >> common/fragment.config
            echo "# CONFIG_LTO_CLANG_FULL is not set" >> common/fragment.config
          fi

          if [ -f common/scripts/kconfig/merge_config.sh ]; then
            common/scripts/kconfig/merge_config.sh -m -O common/out \
              common/arch/arm64/configs/gki_defconfig \
              common/fragment.config
          else
            scripts/kconfig/merge_config.sh -m -O common/out \
              common/arch/arm64/configs/gki_defconfig \
              common/fragment.config
          fi

          make -C common O=out olddefconfig

          grep CONFIG_KSU=y common/out/.config
          if [ "${{ github.event.inputs.susfs }}" = "yes" ]; then
            grep CONFIG_KSU_SUSFS=y common/out/.config
          fi

          ccache -M 5G

          export BUILD_CONFIG=common/build.config.gki.aarch64
          export OUT_DIR=$(pwd)/out
          export MAKEFLAGS="-j$(nproc)"
          export NINJA_ARGS="-j$(nproc)"

          bash build/build.sh

          IMAGE=$(find out -name "Image*" -print -quit)
          [ -n "$IMAGE" ]

      - name: package
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/DikyVinus/AnyKernel3 AnyKernel3
          IMAGE=$(find kernel/out -name "Image*" -print -quit)
          install -m644 "$IMAGE" AnyKernel3/
          cd AnyKernel3
          zip -r9 -q -x '*.git*' -x '*.md' kernel-${{ github.event.inputs.kernel_version }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: AnyKernel3/*.zip
