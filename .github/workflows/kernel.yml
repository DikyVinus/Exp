name: Build Kernel (GKI LTS + DroidSpace + KernelSU Next)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        type: choice
        required: true
        options: ["5.10", "6.1", "6.6"]

      droidspace:
        type: boolean
        required: true
        default: false

      kernelsu:
        type: boolean
        required: true
        default: false

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      # -----------------------------
      # REPO TOOL
      # -----------------------------
      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      # -----------------------------
      # GKI BRANCH SELECT
      # -----------------------------
      - name: Set GKI branch
        run: |
          case "${{ inputs.kernel_version }}" in
            5.10) echo "BRANCH=common-android12-5.10-lts" >> $GITHUB_ENV ;;
            6.1)  echo "BRANCH=common-android14-6.1-lts" >> $GITHUB_ENV ;;
            6.6)  echo "BRANCH=common-android15-6.6-lts" >> $GITHUB_ENV ;;
          esac

      # -----------------------------
      # SYNC SOURCE
      # -----------------------------
      - name: Sync kernel source
        run: |
          mkdir -p kernel
          cd kernel

          repo init -u https://android.googlesource.com/kernel/manifest -b $BRANCH
          repo sync -c -j$(nproc) --no-clone-bundle --no-tags --force-sync --optimized-fetch --prune

      # -----------------------------
      # CLEAN
      # -----------------------------
      - name: Clean kernel tree
        run: |
          cd kernel/common
          make mrproper
          rm -rf ../out

      # -----------------------------
      # PATCHES (NOT CONFIGS)
      # -----------------------------
      - name: Apply DroidSpace patch
        if: ${{ inputs.droidspace == true && inputs.kernel_version == '5.10' }}
        run: |
          cd kernel/common
          curl -sSL -o patch.patch \
            https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch

          patch -p1 --forward --reject-file=- < patch.patch

      - name: Apply KernelSU Next
        if: ${{ inputs.kernelsu == true }}
        run: |
          cd kernel/common
          git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git ksu
          bash ksu/kernel/setup.sh

      # -----------------------------
      # DEFCONFIG (GKI BASE ONLY)
      # -----------------------------
      - name: Generate base defconfig
        run: |
          cd kernel/common

          export O=../out/android-${{ inputs.kernel_version }}-gki
          mkdir -p $O

          make O=$O ARCH=arm64 gki_defconfig

      # -----------------------------
      # DROIDSPACE FRAGMENT (ONLY SOURCE OF CONFIGS)
      # -----------------------------
      - name: Create DroidSpace fragment
        if: ${{ inputs.droidspace == true }}
        run: |
          mkdir -p fragments

          cat > fragments/droidspace.fragment << 'EOF'
          # DroidSpace kernel feature set (GKI overlay)

          CONFIG_SYSVIPC=y
          CONFIG_DEVTMPFS=y

          CONFIG_PID_NS=y
          CONFIG_POSIX_MQUEUE=y

          CONFIG_IPC_NS=y
          CONFIG_UTS_NS=y
          CONFIG_NET_NS=y
          CONFIG_USER_NS=y

          CONFIG_TMPFS_XATTR=y
          EOF

      # -----------------------------
      # MERGE FRAGMENT (ONLY IF ENABLED)
      # -----------------------------
      - name: Apply DroidSpace fragment
        if: ${{ inputs.droidspace == true }}
        run: |
          cd kernel/common

          export O=../out/android-${{ inputs.kernel_version }}-gki

          ./scripts/kconfig/merge_config.sh \
            -m \
            -O $O \
            $O/.config \
            ../../fragments/droidspace.fragment

          make O=$O ARCH=arm64 olddefconfig

      # -----------------------------
      # BUILD
      # -----------------------------
      - name: Build kernel
        run: |
          cd kernel

          export MAKEFLAGS="-j$(nproc)"
          export BUILD_CONFIG=common/build.config.gki.aarch64
          export LTO=thin
          export LLVM=1
          export LLVM_IAS=1

          build/build.sh

      # -----------------------------
      # PACKAGE
      # -----------------------------
      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/DikyVinus/AnyKernel3 ak3

          cp $(find kernel -name Image -type f | head -n1) ak3/

          cd ak3
          zip -r kernel-${{ inputs.kernel_version }}.zip .

      # -----------------------------
      # ARTIFACT
      # -----------------------------
      - uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ inputs.kernel_version }}
          path: ak3/*.zip
