name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        type: choice
        required: true
        options:
          - "5.10"
          - "6.1"
          - "6.6"

      manager:
        type: choice
        required: true
        default: Vanilla
        options:
          - Vanilla
          - KernelSU
          - KowSU
          - KernelSU-Next
          - ResukiSU
          - Rissu
          - Wild_KSU

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Init submodules
        run: |
          git submodule update --init --depth=1 src/${{ inputs.kernel_version }}

          if [ "${{ inputs.manager }}" != "Vanilla" ]; then
            git submodule update --init --depth=1 manager/${{ inputs.manager }}
          fi

      - name: Pick branch
        run: |
          if [ "${{ inputs.kernel_version }}" = "5.10" ]; then echo "BRANCH=common-android12-5.10" >> $GITHUB_ENV; fi
          if [ "${{ inputs.kernel_version }}" = "6.1" ]; then echo "BRANCH=common-android14-6.1" >> $GITHUB_ENV; fi
          if [ "${{ inputs.kernel_version }}" = "6.6" ]; then echo "BRANCH=common-android15-6.6" >> $GITHUB_ENV; fi

      - name: Direct clone minimal tree
        run: |
          mkdir kernel
          cd kernel

          git clone --depth=1 -b $BRANCH https://android.googlesource.com/kernel/build build
          git clone --depth=1 -b $BRANCH https://android.googlesource.com/kernel/prebuilts/build-tools prebuilts-build-tools
          git clone --depth=1 -b $BRANCH https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 prebuilts-clang

          mkdir -p prebuilts/build-tools
          mkdir -p prebuilts/clang/host

          mv prebuilts-build-tools prebuilts/build-tools
          mv prebuilts-clang prebuilts/clang/host/linux-x86

      - name: Add custom common
        run: |
          cp -a src/${{ inputs.kernel_version }} kernel/common

      - name: Patch manager
        if: ${{ inputs.manager != 'Vanilla' }}
        run: |
          cd kernel/common
          bash $GITHUB_WORKSPACE/manager/${{ inputs.manager }}/kernel/setup.sh

      - name: Build
        run: |
          cd kernel
          export BUILD_CONFIG=common/build.config.gki.aarch64
          bash build/build.sh

      - name: Pack
        run: |
          git clone --depth=1 https://github.com/DikyVinus/AnyKernel3 ak3
          cp $(find kernel -name Image | head -n1) ak3/
          cd ak3
          zip -r kernel.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: ak3/kernel.zip
