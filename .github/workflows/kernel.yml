name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Android common kernel version"
        required: true
        type: choice
        options: ["5.10", "6.1", "6.6"]

      kernel_commit:
        description: "Optional kernel/common commit override"
        required: false
        default: ""
        type: string

      manager:
        description: "Root manager"
        required: true
        type: choice
        default: Vanilla
        options:
          - Vanilla
          - KernelSU
          - KowSU
          - KernelSU-Next
          - ResukiSU
          - Rissu
          - Wild_KSU

      manager_commit:
        description: "Optional manager commit override"
        required: false
        default: ""
        type: string

      lto_mode:
        description: "LTO mode"
        required: true
        type: choice
        options: [thin, full, none]

      susfs:
        description: "Apply SUSFS"
        required: true
        type: choice
        options: ["no", "yes"]

      susfs_commit:
        description: "Optional SUSFS commit override"
        required: false
        default: ""
        type: string

      llvm_url:
        description: "Optional override: LLVM Linux x86_64 tar.xz URL"
        required: false
        default: ""
        type: string

      llvm_label:
        description: "Optional override label for the toolchain"
        required: false
        default: ""
        type: string

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: Setup host
        run: |
          echo 'precedence ::ffff:0:0/96 100' | sudo tee -a /etc/gai.conf
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1

          git config --global protocol.version 2
          git config --global core.compression 0
          git config --global fetch.parallel "$(nproc)"

          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            git zip unzip curl wget ccache rsync ca-certificates \
            bc bison flex libssl-dev libelf-dev python3 dwarves \
            pahole file xz-utils zstd jq \
            libarchive-tools patch

          mkdir -p ~/bin
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> "$GITHUB_PATH"

          echo "JOBS=$(nproc)" >> "$GITHUB_ENV"
          echo "USE_CCACHE=1" >> "$GITHUB_ENV"
          echo "CCACHE_COMPRESS=1" >> "$GITHUB_ENV"

      - name: Check out workflow repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Resolve latest LLVM Linux x86_64
        id: llvmmeta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          API="https://api.github.com/repos/llvm/llvm-project/releases/latest"

          if [ -n "${{ inputs.llvm_url }}" ]; then
            llvm_url="${{ inputs.llvm_url }}"
          else
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "$API" > llvm-latest.json

            llvm_url="$(jq -r '
              .assets[]
              | select(.name | test("^LLVM-[0-9][^/]*-Linux-X64\\.tar\\.xz$"))
              | .browser_download_url
            ' llvm-latest.json | head -n1)"

            if [ -z "$llvm_url" ] || [ "$llvm_url" = "null" ]; then
              echo "Failed to resolve latest LLVM Linux x86_64 asset"
              jq -r '.tag_name, (.assets[]?.name)' llvm-latest.json || true
              exit 1
            fi
          fi

          llvm_file="$(basename "${llvm_url%%\?*}")"
          if [ -n "${{ inputs.llvm_label }}" ]; then
            llvm_label="${{ inputs.llvm_label }}"
          else
            llvm_label="${llvm_file%.tar.xz}"
          fi

          echo "llvm_url=$llvm_url" >> "$GITHUB_OUTPUT"
          echo "llvm_label=$llvm_label" >> "$GITHUB_OUTPUT"

      - name: Download and install LLVM
        run: |
          mkdir -p toolchain
          wget -O llvm.tar.xz "${{ steps.llvmmeta.outputs.llvm_url }}"
          bsdtar -xpf llvm.tar.xz -C toolchain

          LLVM_ROOT="$(find toolchain -mindepth 1 -maxdepth 1 -type d | head -n1)"
          test -n "$LLVM_ROOT"
          test -x "$LLVM_ROOT/bin/clang"
          test -x "$LLVM_ROOT/bin/ld.lld"

          echo "LLVM_ROOT=$LLVM_ROOT" >> "$GITHUB_ENV"
          echo "$LLVM_ROOT/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: |
          command -v clang
          clang --version
          ld.lld --version
          llvm-ar --version

      - name: Init submodules
        run: |
          git -c submodule.fetchJobs="$JOBS" submodule update \
            --init --depth=1 --filter=blob:none \
            "src/${{ inputs.kernel_version }}"

          if [ "${{ inputs.manager }}" != "Vanilla" ]; then
            git -c submodule.fetchJobs="$JOBS" submodule update \
              --init --depth=1 --filter=blob:none \
              "manager/${{ inputs.manager }}"
          fi

          test -d "src/${{ inputs.kernel_version }}"
          if [ "${{ inputs.manager }}" != "Vanilla" ]; then
            test -d "manager/${{ inputs.manager }}"
          fi

      - name: Override manager commit
        if: ${{ inputs.manager != 'Vanilla' && inputs.manager_commit != '' }}
        run: |
          git -C "manager/${{ inputs.manager }}" fetch origin "${{ inputs.manager_commit }}" --depth=1
          git -C "manager/${{ inputs.manager }}" checkout --detach FETCH_HEAD
          git -C "manager/${{ inputs.manager }}" log --oneline -1

      - name: Resolve Android branch metadata
        id: vars
        run: |
          case "${{ inputs.kernel_version }}" in
            5.10)
              echo "android=android12" >> "$GITHUB_OUTPUT"
              echo "branch=common-android12-5.10" >> "$GITHUB_OUTPUT"
              ;;
            6.1)
              echo "android=android14" >> "$GITHUB_OUTPUT"
              echo "branch=common-android14-6.1" >> "$GITHUB_OUTPUT"
              ;;
            6.6)
              echo "android=android15" >> "$GITHUB_OUTPUT"
              echo "branch=common-android15-6.6" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported kernel version"
              exit 1
              ;;
          esac

      - name: Restore repo cache
        uses: actions/cache@v4
        with:
          path: kernel/.repo
          key: repo-${{ steps.vars.outputs.branch }}
          restore-keys: |
            repo-${{ steps.vars.outputs.branch }}

      - name: Init Android kernel repo
        run: |
          mkdir -p kernel
          cd kernel

          if [ ! -d .repo ]; then
            repo init -u https://android.googlesource.com/kernel/manifest \
              -b "${{ steps.vars.outputs.branch }}"
          fi

          mkdir -p .repo/local_manifests
          cat > .repo/local_manifests/remove.xml <<'EOF'
          <manifest>
            <remove-project name="kernel/common"/>
          </manifest>
          EOF

      - name: Sync kernel sources
        working-directory: kernel
        run: |
          REPO_SYNC_FORCE_IPV4=1 repo sync -c -j"$((JOBS * 2))" \
            --optimized-fetch --prune --fail-fast \
            --no-tags --current-branch || :

          test -d common
          test -f build/build.sh
          ls -la
          git -C common log --oneline -1 || true

      - name: Inject custom source tree
        run: |
          rsync -a --delete --checksum \
            "src/${{ inputs.kernel_version }}/" \
            "kernel/common/"

          test -d kernel/common/arch
          test -f kernel/common/Makefile
          test -f kernel/build/build.sh

      - name: Override kernel commit
        if: ${{ inputs.kernel_commit != '' }}
        run: |
          git -C kernel/common fetch origin "${{ inputs.kernel_commit }}" --depth=1
          git -C kernel/common checkout --detach FETCH_HEAD
          git -C kernel/common log --oneline -1

      - name: Apply manager patches
        if: ${{ inputs.manager != 'Vanilla' }}
        run: |
          test -f "manager/${{ inputs.manager }}/kernel/setup.sh"

          pushd kernel/common
          bash "${GITHUB_WORKSPACE}/manager/${{ inputs.manager }}/kernel/setup.sh"
          popd

      - name: Fetch and apply SUSFS
        if: ${{ inputs.susfs == 'yes' }}
        run: |
          SUSFS_DIR="$GITHUB_WORKSPACE/susfs"
          SUSFS_BRANCH="gki-${{ steps.vars.outputs.android }}-${{ inputs.kernel_version }}"

          rm -rf "$SUSFS_DIR"

          if [ -n "${{ inputs.susfs_commit }}" ]; then
            git init "$SUSFS_DIR"
            git -C "$SUSFS_DIR" remote add origin https://gitlab.com/simonpunk/susfs4ksu.git
            git -C "$SUSFS_DIR" fetch --depth=1 origin "${{ inputs.susfs_commit }}"
            git -C "$SUSFS_DIR" checkout --detach FETCH_HEAD
          else
            git clone --depth=1 --filter=blob:none -b "$SUSFS_BRANCH" \
              https://gitlab.com/simonpunk/susfs4ksu.git "$SUSFS_DIR"
          fi

          git -C "$SUSFS_DIR" log --oneline -1

          test -d "$SUSFS_DIR/kernel_patches/fs"
          test -d "$SUSFS_DIR/kernel_patches/include/linux"

          rsync -a "$SUSFS_DIR/kernel_patches/fs/" "kernel/common/fs/"
          rsync -a "$SUSFS_DIR/kernel_patches/include/linux/" "kernel/common/include/linux/"

          PATCH_FILE="$(find "$SUSFS_DIR/kernel_patches" -type f -name '50_add_susfs_in_*.patch' | sort | head -n1)"
          test -n "$PATCH_FILE"

          pushd kernel/common
          patch -p1 --forward --reject-file=- < "$PATCH_FILE"
          popd

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ inputs.kernel_version }}-${{ inputs.manager }}-${{ inputs.lto_mode }}-${{ steps.llvmmeta.outputs.llvm_label }}
          restore-keys: |
            ccache-${{ inputs.kernel_version }}-${{ inputs.manager }}-${{ inputs.lto_mode }}-
            ccache-${{ inputs.kernel_version }}-${{ inputs.manager }}-
            ccache-${{ inputs.kernel_version }}-

      - name: Configure kernel
        run: |
          OUT_DIR="$GITHUB_WORKSPACE/kernel/out"

          make -C kernel/common O="$OUT_DIR" ARCH=arm64 gki_defconfig

          test -x kernel/common/scripts/config || chmod +x kernel/common/scripts/config

          cfg_enable() {
            kernel/common/scripts/config --file "$OUT_DIR/.config" -e "$1"
          }

          cfg_disable() {
            kernel/common/scripts/config --file "$OUT_DIR/.config" -d "$1"
          }

          if [ "${{ inputs.susfs }}" = "yes" ]; then
            for sym in \
              KSU_SUSFS \
              KSU_SUS_PATH \
              KSU_SUS_MOUNT \
              KSU_SUS_KSTAT \
              KSU_SPOOF_UNAME \
              KSU_OPEN_REDIRECT \
              KSU_SUS_MAP \
              KSU_ENABLE_LOG \
              KSU_HIDE_KSU_SUSFS_SYMBOLS \
              KSU_SPOOF_CMDLINE_OR_BOOTCONFIG
            do
              cfg_enable "$sym" || true
            done
          fi

          case "${{ inputs.lto_mode }}" in
            thin)
              cfg_enable LTO_CLANG || true
              cfg_enable LTO_CLANG_THIN || true
              cfg_disable LTO_CLANG_FULL || true
              ;;
            full)
              cfg_enable LTO_CLANG || true
              cfg_enable LTO_CLANG_FULL || true
              cfg_disable LTO_CLANG_THIN || true
              ;;
            none)
              cfg_disable LTO_CLANG || true
              cfg_disable LTO_CLANG_THIN || true
              cfg_disable LTO_CLANG_FULL || true
              ;;
          esac

          yes "" | make -C kernel/common O="$OUT_DIR" ARCH=arm64 olddefconfig

          echo "Relevant final config:"
          grep -E 'CONFIG_(KSU|SUSFS|LTO_CLANG)' "$OUT_DIR/.config" || true

          if [ "${{ inputs.susfs }}" = "yes" ]; then
            grep -q '^CONFIG_KSU_SUSFS=y' "$OUT_DIR/.config"
          fi

          ccache -M 5G
          ccache -s

      - name: Build kernel with repo build.sh and downloaded LLVM
        working-directory: kernel
        run: |
          export PATH="$LLVM_ROOT/bin:$PATH"

          export CC="ccache clang"
          export HOSTCC="ccache clang"
          export HOSTCXX="ccache clang++"
          export LD="ld.lld"
          export AR="llvm-ar"
          export NM="llvm-nm"
          export OBJCOPY="llvm-objcopy"
          export OBJDUMP="llvm-objdump"
          export STRIP="llvm-strip"
          export LLVM=1
          export LLVM_IAS=1

          export BUILD_CONFIG=common/build.config.gki.aarch64
          export OUT_DIR="$PWD/out"
          export DIST_DIR="$PWD/out/dist"
          export MAKEFLAGS="-j$JOBS"
          export NINJA_ARGS="-j$JOBS"

          bash build/build.sh

          echo "Build outputs:"
          find out -maxdepth 4 -type f | sort | tail -200

      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 --filter=blob:none \
            https://github.com/DikyVinus/AnyKernel3 ak3

          IMG="$(find kernel/out -type f \( -name 'Image' -o -name 'Image.gz' \) | head -n1)"
          if [ -z "$IMG" ]; then
            echo "Kernel image not found"
            exit 1
          fi

          install -m644 "$IMG" ak3/
          cd ak3
          zip -r9 -q "kernel-${{ inputs.kernel_version }}-${{ inputs.manager }}-${{ steps.llvmmeta.outputs.llvm_label }}.zip" .

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: ak3/*.zip
