name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        required: true
        type: choice
        options: ["5.10", "6.1", "6.6"]

      kernel_commit:
        required: false
        default: ""

      manager:
        required: true
        type: choice
        default: Vanilla
        options:
          - Vanilla
          - KernelSU
          - KowSU
          - KernelSU-Next
          - ResukiSU
          - Rissu
          - Wild_KSU

      manager_commit:
        required: false
        default: ""

      lto_mode:
        required: true
        type: choice
        options: [thin, full, none]

      susfs:
        required: true
        type: choice
        options: ["no", "yes"]

      susfs_commit:
        required: false
        default: ""

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: Setup
        run: |
          echo 'precedence ::ffff:0:0/96 100' | sudo tee -a /etc/gai.conf
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1

          git config --global protocol.version 2
          git config --global core.compression 0
          git config --global fetch.parallel $(nproc)

          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            git zip curl ccache rsync ca-certificates \
            bc bison flex libssl-dev libelf-dev python3 dwarves

          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

          echo "JOBS=$(nproc)" >> $GITHUB_ENV
          echo "USE_CCACHE=1" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Submodules
        run: |
          git -c submodule.fetchJobs=$JOBS submodule update \
            --init --depth=1 --filter=blob:none \
            src/${{ inputs.kernel_version }}

          if [ "${{ inputs.manager }}" != "Vanilla" ]; then
            git -c submodule.fetchJobs=$JOBS submodule update \
              --init --depth=1 --filter=blob:none \
              manager/${{ inputs.manager }}
          fi

          [ -d src/${{ inputs.kernel_version }} ] || exit 1
          if [ "${{ inputs.manager }}" != "Vanilla" ]; then
            [ -d manager/${{ inputs.manager }} ] || exit 1
          fi

      - name: Override manager
        if: ${{ inputs.manager != 'Vanilla' && inputs.manager_commit != '' }}
        run: |
          git -C manager/${{ inputs.manager }} fetch origin ${{ inputs.manager_commit }} --depth=1
          git -C manager/${{ inputs.manager }} checkout --detach FETCH_HEAD

      - name: Resolve branch
        id: vars
        run: |
          case "${{ inputs.kernel_version }}" in
            5.10) A=android12 B=common-android12-5.10 ;;
            6.1)  A=android14 B=common-android14-6.1 ;;
            6.6)  A=android15 B=common-android15-6.6 ;;
          esac
          echo "android=$A" >> $GITHUB_OUTPUT
          echo "branch=$B" >> $GITHUB_OUTPUT

      - name: Init repo
        run: |
          mkdir -p kernel
          cd kernel

          if [ ! -d .repo ]; then
            repo init -u https://android.googlesource.com/kernel/manifest \
              -b ${{ steps.vars.outputs.branch }}
          fi

          mkdir -p .repo/local_manifests
          echo '<manifest><remove-project name="kernel/common"/></manifest>' \
            > .repo/local_manifests/remove.xml

      - uses: actions/cache@v4
        with:
          path: kernel/.repo
          key: repo-${{ steps.vars.outputs.branch }}
          restore-keys: |
            repo-${{ steps.vars.outputs.branch }}

      - name: Sync kernel
        working-directory: kernel
        run: |
          REPO_SYNC_FORCE_IPV4=1 repo sync -c -j$(($JOBS * 2)) \
            --optimized-fetch --prune --fail-fast \
            --no-tags --current-branch

      - name: Inject source
        run: |
          rsync -a --delete --checksum \
            src/${{ inputs.kernel_version }}/ kernel/common/

      - name: Override kernel commit
        if: ${{ inputs.kernel_commit != '' }}
        run: |
          git -C kernel/common fetch origin ${{ inputs.kernel_commit }} --depth=1
          git -C kernel/common checkout --detach FETCH_HEAD

      - name: Apply patches
        run: |
          if [ "${{ inputs.manager }}" != "Vanilla" ]; then
            bash manager/${{ inputs.manager }}/kernel/setup.sh
          fi

          if [ "${{ inputs.susfs }}" = yes ]; then
            BR="gki-${{ steps.vars.outputs.android }}-${{ inputs.kernel_version }}"

            if [ -n "${{ inputs.susfs_commit }}" ]; then
              rm -rf susfs
              git init susfs
              git -C susfs remote add origin https://gitlab.com/simonpunk/susfs4ksu.git
              git -C susfs fetch --depth=1 origin ${{ inputs.susfs_commit }}
              git -C susfs checkout --detach FETCH_HEAD
            else
              if [ -d susfs/.git ]; then
                git -C susfs fetch origin "$BR" --depth=1
                git -C susfs checkout --detach FETCH_HEAD
              else
                git clone --depth=1 --filter=blob:none -b "$BR" \
                  https://gitlab.com/simonpunk/susfs4ksu.git susfs
              fi
            fi

            rsync -a susfs/kernel_patches/fs/ kernel/common/fs/
            rsync -a susfs/kernel_patches/include/linux/ kernel/common/include/linux/

            PATCH=$(find susfs/kernel_patches -name "50_add_susfs_in_*.patch" -print -quit)
            cd kernel/common
            patch -p1 --forward < "$PATCH" || exit 1
          fi

      - name: Configure
        run: |
          DEF=kernel/common/arch/arm64/configs/gki_defconfig
          [ -f "$DEF" ] || exit 1

          cfg() {
            sed -i "/^$1=/d;/^# $1 is not set/d" "$DEF"
            [ "$2" = y ] && echo "$1=y" >> "$DEF" || echo "# $1 is not set" >> "$DEF"
          }

          if [ "${{ inputs.susfs }}" = yes ]; then
            for c in CONFIG_KSU_SUSFS{,_SUS_PATH,_SUS_MOUNT,_SUS_KSTAT,_SPOOF_UNAME,_OPEN_REDIRECT,_SUS_MAP,_ENABLE_LOG,_HIDE_KSU_SUSFS_SYMBOLS,_SPOOF_CMDLINE_OR_BOOTCONFIG}; do
              cfg $c y
            done
          fi

          case "${{ inputs.lto_mode }}" in
            thin) cfg CONFIG_LTO_CLANG y; cfg CONFIG_LTO_CLANG_THIN y; cfg CONFIG_LTO_CLANG_FULL n ;;
            full) cfg CONFIG_LTO_CLANG y; cfg CONFIG_LTO_CLANG_FULL y; cfg CONFIG_LTO_CLANG_THIN n ;;
            none) cfg CONFIG_LTO_CLANG n; cfg CONFIG_LTO_CLANG_THIN n; cfg CONFIG_LTO_CLANG_FULL n ;;
          esac

          make -C kernel/common O=kernel/out ARCH=arm64 gki_defconfig

          export CCACHE_COMPRESS=1
          ccache -M 5G
          ccache -s

      - uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ inputs.kernel_version }}
          restore-keys: |
            ccache-${{ inputs.kernel_version }}

      - name: Build
        working-directory: kernel
        run: |
          export CC="ccache clang"
          export BUILD_CONFIG=common/build.config.gki.aarch64
          export OUT_DIR=$(pwd)/out
          export MAKEFLAGS="-j$JOBS"
          export NINJA_ARGS="-j$JOBS"
          bash build/build.sh

      - name: Package
        run: |
          git clone --depth=1 --filter=blob:none \
            https://github.com/DikyVinus/AnyKernel3 ak3

          IMG=$(find kernel/out -type f \( -name "Image" -o -name "Image.gz" \) | head -n1)
          [ -n "$IMG" ] || exit 1

          install -m644 "$IMG" ak3/
          cd ak3
          zip -r9 -q kernel-${{ inputs.kernel_version }}-${{ inputs.manager }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: ak3/*.zip
