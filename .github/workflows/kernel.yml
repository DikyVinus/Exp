name: Google Kernel + AK3 Build

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: Kernel version
        required: true
        type: choice
        options: ["5.10", "6.1", "6.6"]
      manager:
        description: KSU manager
        required: true
        type: choice
        options:
          - KernelSU
          - KowSU
          - KernelSU-Next
          - ResukiSU
          - Rissu
          - Wild_KSU

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Net + git
        run: |
          echo 'precedence ::ffff:0:0/96 100' | sudo tee -a /etc/gai.conf
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          git config --global protocol.version 2
          git config --global core.compression 0

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Deps
        run: |
          sudo apt-get install -y git repo zip curl ccache rsync

      - name: Submodules
        run: |
          git -c submodule.fetchJobs=1 submodule update --init --depth=1 --filter=blob:none src/${{ github.event.inputs.kernel_version }} manager/${{ github.event.inputs.manager }}

      - name: Vars
        id: vars
        run: |
          case "${{ github.event.inputs.kernel_version }}" in
            "5.10") echo "branch=common-android12-5.10" >> $GITHUB_OUTPUT; echo "android=android12" >> $GITHUB_OUTPUT ;;
            "6.1")  echo "branch=common-android14-6.1" >> $GITHUB_OUTPUT; echo "android=android14" >> $GITHUB_OUTPUT ;;
            "6.6")  echo "branch=common-android15-6.6" >> $GITHUB_OUTPUT; echo "android=android15" >> $GITHUB_OUTPUT ;;
          esac

      - uses: actions/cache@v4
        with:
          path: kernel/.repo
          key: repo-${{ steps.vars.outputs.branch }}

      - name: Init + sync repo
        run: |
          mkdir -p kernel
          cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b ${{ steps.vars.outputs.branch }} --depth=1 || true
          mkdir -p .repo/local_manifests
          echo '<manifest><remove-project name="kernel/common" /></manifest>' > .repo/local_manifests/remove-common.xml
          export REPO_SYNC_FORCE_IPV4=1
          repo sync -c -j$(nproc) --optimized-fetch --no-clone-bundle --prune --fail-fast

      - name: Inject src
        run: |
          rsync -a --delete src/${{ github.event.inputs.kernel_version }}/ kernel/common/

      - name: Apply KSU
        run: |
          cd kernel/common
          bash ../../manager/${{ github.event.inputs.manager }}/kernel/setup.sh

      - name: Apply SUSFS
        run: |
          set -euo pipefail
          SUSFS_BRANCH="gki-${{ steps.vars.outputs.android }}-${{ github.event.inputs.kernel_version }}"
          git clone --depth=1 --single-branch https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_BRANCH" susfs4ksu
          cd kernel/common
          cp ../../susfs4ksu/kernel_patches/fs/* fs/
          cp ../../susfs4ksu/kernel_patches/include/linux/* include/linux/
          patch -p1 < ../../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ steps.vars.outputs.android }}-${{ github.event.inputs.kernel_version }}.patch

      - name: Create config fragment
        run: |
          cat > $GITHUB_WORKSPACE/susfs.fragment << 'EOF'
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_LTO_CLANG=y
          CONFIG_LTO_CLANG_THIN=y
          # CONFIG_LTO_CLANG_FULL is not set
          EOF

      - name: Ccache
        run: |
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          ccache -M 5G

      - uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ github.event.inputs.kernel_version }}

      - name: Build
        run: |
          cd kernel
          export USE_CCACHE=1
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          export BUILD_CONFIG=common/build.config.gki.aarch64
          export OUT_DIR=$(pwd)/out
          export MAKEFLAGS="-j$(nproc)"
          export KCONFIG_EXT_CONFIG=$GITHUB_WORKSPACE/susfs.fragment
          bash build/build.sh

      - name: Verify SUSFS
        run: |
          grep CONFIG_KSU_SUSFS kernel/out/.config || exit 1

      - name: Package
        run: |
          set -euo pipefail
          git clone --depth=1 --filter=blob:none https://github.com/DikyVinus/AnyKernel3 AnyKernel3
          IMAGE=$(find kernel/out/dist -name "Image*" -print -quit)
          [ -z "$IMAGE" ] && IMAGE=$(find kernel/out -name "Image*" -print -quit)
          [ -z "$IMAGE" ] && exit 1
          cp "$IMAGE" AnyKernel3/
          cd AnyKernel3
          zip -r9 kernel-${{ github.event.inputs.kernel_version }}-${{ github.event.inputs.manager }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: kernel-zip
          path: AnyKernel3/*.zip
