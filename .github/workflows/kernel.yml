name: Google Kernel + AK3 Build

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Select kernel version"
        required: true
        type: choice
        options:
          - "5.10"
          - "6.1"
          - "6.6"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (self with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git bc bison flex libssl-dev make libc6-dev libncurses5-dev crossbuild-essential-arm64 repo zip curl

      - name: Set branch + src path
        id: cfg
        run: |
          case "${{ github.event.inputs.kernel_version }}" in
            "5.10")
              echo "branch=common-android13-5.10" >> $GITHUB_OUTPUT
              echo "src=common-5.10" >> $GITHUB_OUTPUT
              ;;
            "6.1")
              echo "branch=common-android14-6.1" >> $GITHUB_OUTPUT
              echo "src=common-6.1" >> $GITHUB_OUTPUT
              ;;
            "6.6")
              echo "branch=common-android15-6.6" >> $GITHUB_OUTPUT
              echo "src=common-6.6" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Init + sync Google kernel
        run: |
          mkdir kernel && cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b ${{ steps.cfg.outputs.branch }}
          repo sync -c -j$(nproc)

      - name: Replace kernel/common with selected source
        run: |
          rm -rf kernel/common
          cp -r ${{ steps.cfg.outputs.src }} kernel/common

      - name: Apply KSU patches (manager script only)
        run: |
          cd kernel/common
          bash ../../manager/setup.sh $(pwd)

      - name: Setup clang
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang

      - name: Build kernel
        run: |
          cd kernel/common
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH

          make O=out CC=clang defconfig
          make -j$(nproc) O=out CC=clang

      - name: Clone AnyKernel3
        run: |
          git clone --depth=1 https://github.com/DikyVinus/AnyKernel3 AnyKernel3

      - name: Copy kernel image
        run: |
          cp kernel/common/out/arch/arm64/boot/Image AnyKernel3/

      - name: Zip AnyKernel3
        run: |
          cd AnyKernel3
          zip -r9 kernel-${{ github.event.inputs.kernel_version }}.zip *

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: kernel-zip
          path: AnyKernel3/*.zip
