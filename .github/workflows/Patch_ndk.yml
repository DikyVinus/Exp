name: Build ARM64-hosted Android NDK

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Official NDK channel to auto-resolve when ndk_url is empty"
        required: true
        default: stable
        type: choice
        options:
          - stable
          - prerelease

      ndk_url:
        description: "Optional override: direct official NDK Linux zip URL"
        required: false
        default: ""
        type: string

      ndk_version_label:
        description: "Optional override label for output/tag naming"
        required: false
        default: ""
        type: string

      llvm_arm64_url:
        description: "Optional override: direct LLVM Linux ARM64 tar.xz URL"
        required: false
        default: ""
        type: string

      llvm_label:
        description: "Optional override label for LLVM in output/tag naming"
        required: false
        default: ""
        type: string

      package_name:
        description: "Optional output base name"
        required: false
        default: ""
        type: string

      package_format:
        description: "Artifact format"
        required: true
        default: tar.7z
        type: choice
        options:
          - tar.7z
          - zip
          - both

      slim_mode:
        description: "Trim host toolchain aggressively"
        required: true
        default: true
        type: boolean

      ultra_slim_mode:
        description: "Aggressively trim host toolchain and non-aarch64 target sysroot"
        required: true
        default: false
        type: boolean

      keep_x86_host:
        description: "Keep original linux-x86_64 host tree in final package"
        required: true
        default: false
        type: boolean

      compression_profile:
        description: "Compression profile for tar.7z"
        required: true
        default: balanced
        type: choice
        options:
          - fast
          - balanced
          - aggressive
          - ultra

      create_release:
        description: "Create GitHub release"
        required: false
        default: false
        type: boolean

      create_tag:
        description: "Create git tag"
        required: false
        default: false
        type: boolean

      tag_name:
        description: "Optional tag override"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl wget unzip zip p7zip-full \
            tar xz-utils zstd file rsync jq \
            libarchive-tools perl patchelf

      - name: Prepare workspace
        run: |
          rm -rf work
          mkdir -p work/downloads work/src work/out work/verify

      - name: Resolve latest official NDK
        id: ndkmeta
        run: |
          PAGE="https://developer.android.com/ndk/downloads"
          HTML="work/downloads/ndk-downloads.html"

          DEFAULT_STABLE="https://dl.google.com/android/repository/android-ndk-r29-linux.zip"
          DEFAULT_PRERELEASE="https://dl.google.com/android/repository/android-ndk-r30-beta1-linux.zip"

          if [ -n "${{ inputs.ndk_url }}" ]; then
            ndk_url="${{ inputs.ndk_url }}"
          else
            curl -fsSL "$PAGE" -o "$HTML"

            case "${{ inputs.release_channel }}" in
              stable)
                ndk_url="$(grep -oE 'https://dl\.google\.com/android/repository/android-ndk-r[0-9]+-linux\.zip' "$HTML" | head -n1 || true)"
                [ -n "$ndk_url" ] || ndk_url="$DEFAULT_STABLE"
                ;;
              prerelease)
                ndk_url="$(grep -oE 'https://dl\.google\.com/android/repository/android-ndk-r[0-9]+-beta[0-9]+-linux\.zip' "$HTML" | head -n1 || true)"
                [ -n "$ndk_url" ] || ndk_url="$DEFAULT_PRERELEASE"
                ;;
              *)
                echo "Unknown release_channel: ${{ inputs.release_channel }}"
                exit 1
                ;;
            esac
          fi

          filename="$(basename "${ndk_url%%\?*}")"

          if [ -n "${{ inputs.ndk_version_label }}" ]; then
            label="${{ inputs.ndk_version_label }}"
          else
            label="${filename%.zip}"
            label="${label#android-ndk-}"
          fi

          echo "ndk_url=$ndk_url" >> "$GITHUB_OUTPUT"
          echo "ndk_filename=$filename" >> "$GITHUB_OUTPUT"
          echo "ndk_label=$label" >> "$GITHUB_OUTPUT"

      - name: Resolve latest LLVM Linux ARM64
        id: llvmmeta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          API="https://api.github.com/repos/llvm/llvm-project/releases/latest"

          if [ -n "${{ inputs.llvm_arm64_url }}" ]; then
            llvm_url="${{ inputs.llvm_arm64_url }}"
          else
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "$API" > work/downloads/llvm-latest.json

            llvm_url="$(jq -r '
              .assets[]
              | select(.name | test("^LLVM-[0-9][^/]*-Linux-ARM64\\.tar\\.xz$"))
              | .browser_download_url
            ' work/downloads/llvm-latest.json | head -n1)"

            if [ -z "$llvm_url" ] || [ "$llvm_url" = "null" ]; then
              echo "Failed to resolve latest LLVM Linux ARM64 asset"
              jq -r '.tag_name, (.assets[]?.name)' work/downloads/llvm-latest.json || true
              exit 1
            fi
          fi

          llvm_file="$(basename "${llvm_url%%\?*}")"

          if [ -n "${{ inputs.llvm_label }}" ]; then
            llvm_label="${{ inputs.llvm_label }}"
          else
            llvm_label="${llvm_file%.tar.xz}"
          fi

          echo "llvm_url=$llvm_url" >> "$GITHUB_OUTPUT"
          echo "llvm_file=$llvm_file" >> "$GITHUB_OUTPUT"
          echo "llvm_label=$llvm_label" >> "$GITHUB_OUTPUT"

      - name: Download official NDK
        run: |
          wget -O work/downloads/ndk.zip "${{ steps.ndkmeta.outputs.ndk_url }}"
          test -s work/downloads/ndk.zip

      - name: Download LLVM Linux ARM64
        run: |
          wget -O work/downloads/llvm.tar.xz "${{ steps.llvmmeta.outputs.llvm_url }}"
          test -s work/downloads/llvm.tar.xz

      - name: Extract official NDK
        run: |
          unzip -q work/downloads/ndk.zip -d work/src
          NDK_ROOT="$(find work/src -mindepth 1 -maxdepth 1 -type d | head -n1)"
          test -n "$NDK_ROOT"
          echo "NDK_ROOT=$NDK_ROOT" >> "$GITHUB_ENV"

      - name: Extract LLVM Linux ARM64
        run: |
          mkdir -p work/src/llvm-arm64
          bsdtar -xpf work/downloads/llvm.tar.xz -C work/src/llvm-arm64

          LLVM_ROOT="$(find work/src/llvm-arm64 -mindepth 1 -maxdepth 1 -type d | head -n1 || true)"
          if [ -z "$LLVM_ROOT" ]; then
            LLVM_ROOT="work/src/llvm-arm64"
          fi

          test -d "$LLVM_ROOT/bin"
          echo "LLVM_ROOT=$LLVM_ROOT" >> "$GITHUB_ENV"

      - name: Build minimal ARM64 host tree
        run: |
          PREBUILT_DIR="$NDK_ROOT/toolchains/llvm/prebuilt"
          ORIG_HOST="$PREBUILT_DIR/linux-x86_64"
          ARM64_HOST="$PREBUILT_DIR/linux-arm64"

          test -d "$ORIG_HOST"
          rm -rf "$ARM64_HOST"
          mkdir -p "$ARM64_HOST"/{bin,lib,libexec,share}

          rsync -a "$ORIG_HOST/sysroot/" "$ARM64_HOST/sysroot/"

          [ -f "$ORIG_HOST/source.properties" ] && cp -a "$ORIG_HOST/source.properties" "$ARM64_HOST/"
          [ -f "$ORIG_HOST/NOTICE" ] && cp -a "$ORIG_HOST/NOTICE" "$ARM64_HOST/" || true

      - name: Overlay selected LLVM tools and resources
        run: |
          ARM64_HOST="$NDK_ROOT/toolchains/llvm/prebuilt/linux-arm64"

          if [ "${{ inputs.ultra_slim_mode }}" = "true" ]; then
            keep_bin=(
              clang
              clang++
              ld.lld
              llvm-ar
              llvm-ranlib
              llvm-nm
              llvm-objcopy
              llvm-objdump
              llvm-readelf
              llvm-strip
            )
          else
            keep_bin=(
              clang
              clang++
              clang-cpp
              ld.lld
              lld
              llvm-ar
              llvm-ranlib
              llvm-nm
              llvm-objcopy
              llvm-objdump
              llvm-readelf
              llvm-strip
              llvm-strings
              llvm-size
            )

            if [ "${{ inputs.slim_mode }}" != "true" ]; then
              keep_bin+=(clangd)
            fi
          fi

          mkdir -p "$ARM64_HOST/bin"

          for f in "${keep_bin[@]}"; do
            if [ -e "$LLVM_ROOT/bin/$f" ]; then
              cp -a "$LLVM_ROOT/bin/$f" "$ARM64_HOST/bin/"
            fi
          done

          for f in "${keep_bin[@]}"; do
            if [ -L "$LLVM_ROOT/bin/$f" ]; then
              target="$(readlink "$LLVM_ROOT/bin/$f")"
              if [ -n "$target" ] && [ -e "$LLVM_ROOT/bin/$target" ]; then
                cp -a "$LLVM_ROOT/bin/$target" "$ARM64_HOST/bin/" || true
                ln -sf "$target" "$ARM64_HOST/bin/$f"
              fi
            fi
          done

          if [ -d "$LLVM_ROOT/lib/clang" ]; then
            mkdir -p "$ARM64_HOST/lib"
            rsync -a "$LLVM_ROOT/lib/clang/" "$ARM64_HOST/lib/clang/"
          fi

      - name: Copy required shared libraries only
        run: |
          ARM64_HOST="$NDK_ROOT/toolchains/llvm/prebuilt/linux-arm64"
          mkdir -p "$ARM64_HOST/lib"

          needed_bins=(
            "$ARM64_HOST/bin/clang"
            "$ARM64_HOST/bin/clang++"
            "$ARM64_HOST/bin/ld.lld"
            "$ARM64_HOST/bin/llvm-ar"
            "$ARM64_HOST/bin/llvm-nm"
            "$ARM64_HOST/bin/llvm-objcopy"
            "$ARM64_HOST/bin/llvm-strip"
          )

          : > work/needed-libs.txt

          for b in "${needed_bins[@]}"; do
            [ -e "$b" ] || continue
            patchelf --print-needed "$b" 2>/dev/null || true
          done | sort -u > work/needed-libs.txt

          while read -r lib; do
            [ -n "$lib" ] || continue
            found="$(find "$LLVM_ROOT/lib" "$LLVM_ROOT/libexec" -name "$lib" -type f | head -n1 || true)"
            if [ -n "$found" ]; then
              relbase="$LLVM_ROOT"
              relpath="${found#$relbase/}"
              mkdir -p "$ARM64_HOST/$(dirname "$relpath")"
              cp -a "$found" "$ARM64_HOST/$relpath"
            fi
          done < work/needed-libs.txt

      - name: Patch host references
        run: |
          HOST_OLD="linux-x86_64"
          HOST_NEW="linux-arm64"

          mapfile -t files < <(grep -RIl --exclude-dir=.git "$HOST_OLD" "$NDK_ROOT" || true)

          for f in "${files[@]}"; do
            if file "$f" | grep -qiE 'text|script|json|xml'; then
              sed -i "s/${HOST_OLD}/${HOST_NEW}/g" "$f" || true
            fi
          done

      - name: Prune extras from ARM64 host
        if: ${{ inputs.slim_mode || inputs.ultra_slim_mode }}
        run: |
          ARM64_HOST="$NDK_ROOT/toolchains/llvm/prebuilt/linux-arm64"

          rm -rf \
            "$ARM64_HOST/include" \
            "$ARM64_HOST/share/doc" \
            "$ARM64_HOST/share/man" \
            "$ARM64_HOST/share/opt-viewer" \
            "$ARM64_HOST/lib/python"* \
            "$ARM64_HOST/bin/lldb"* \
            "$ARM64_HOST/lib/liblldb"* \
            "$ARM64_HOST/lib/cmake" \
            "$ARM64_HOST/libexec"/*lldb* || true

          find "$ARM64_HOST/lib" -type f -name '*.a' -delete || true
          find "$ARM64_HOST/lib" -type f -name '*.la' -delete || true

          if [ "${{ inputs.ultra_slim_mode }}" = "true" ]; then
            find "$ARM64_HOST/bin" -maxdepth 1 -type f \
              ! -name clang \
              ! -name clang++ \
              ! -name ld.lld \
              ! -name llvm-ar \
              ! -name llvm-ranlib \
              ! -name llvm-nm \
              ! -name llvm-objcopy \
              ! -name llvm-objdump \
              ! -name llvm-readelf \
              ! -name llvm-strip \
              -delete || true

            find "$ARM64_HOST/bin" -maxdepth 1 -type l \
              ! -name clang \
              ! -name clang++ \
              ! -name ld.lld \
              ! -name llvm-ar \
              ! -name llvm-ranlib \
              ! -name llvm-nm \
              ! -name llvm-objcopy \
              ! -name llvm-objdump \
              ! -name llvm-readelf \
              ! -name llvm-strip \
              -delete || true
          fi

      - name: Prune sysroot to aarch64 only in ultra slim mode
        if: ${{ inputs.ultra_slim_mode }}
        run: |
          SYSROOT="$NDK_ROOT/toolchains/llvm/prebuilt/linux-arm64/sysroot"

          find "$SYSROOT/usr/lib" -mindepth 1 -maxdepth 1 -type d | while read -r d; do
            base="$(basename "$d")"
            case "$base" in
              aarch64-linux-android|clang)
                ;;
              *)
                rm -rf "$d"
                ;;
            esac
          done

          find "$SYSROOT/usr/include" -maxdepth 1 -type d -name 'i686-linux-android*' -exec rm -rf {} + || true
          find "$SYSROOT/usr/include" -maxdepth 1 -type d -name 'x86_64-linux-android*' -exec rm -rf {} + || true
          find "$SYSROOT/usr/include" -maxdepth 1 -type d -name 'arm-linux-androideabi*' -exec rm -rf {} + || true

      - name: Strip host binaries and libs
        run: |
          ARM64_HOST="$NDK_ROOT/toolchains/llvm/prebuilt/linux-arm64"

          find "$ARM64_HOST/bin" -maxdepth 1 -type f -exec chmod +x {} + || true

          STRIP_TOOL=""
          if [ -x "$ARM64_HOST/bin/llvm-strip" ]; then
            STRIP_TOOL="$ARM64_HOST/bin/llvm-strip"
          elif command -v llvm-strip >/dev/null 2>&1; then
            STRIP_TOOL="$(command -v llvm-strip)"
          fi

          if [ -n "$STRIP_TOOL" ]; then
            while read -r f; do
              file "$f" | grep -q 'ELF' || continue
              "$STRIP_TOOL" "$f" 2>/dev/null || true
            done < <(find "$ARM64_HOST/bin" "$ARM64_HOST/lib" -type f 2>/dev/null)
          fi

      - name: Remove duplicate x86 host tree from final package
        if: ${{ inputs.keep_x86_host != true }}
        run: |
          rm -rf "$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"

      - name: Inspect biggest files
        run: |
          echo "Top-level size:"
          du -sh "$NDK_ROOT"/* 2>/dev/null | sort -h || true
          echo
          echo "Prebuilt tree size:"
          du -sh "$NDK_ROOT/toolchains/llvm/prebuilt"/* 2>/dev/null | sort -h || true
          echo
          echo "ARM64 host detail:"
          du -sh "$NDK_ROOT/toolchains/llvm/prebuilt/linux-arm64"/* 2>/dev/null | sort -h || true
          echo
          echo "Biggest files in bin:"
          find "$NDK_ROOT/toolchains/llvm/prebuilt/linux-arm64/bin" -maxdepth 1 -type f -printf '%s %p\n' | sort -n | tail -40 || true
          echo
          echo "Biggest files in sysroot:"
          find "$NDK_ROOT/toolchains/llvm/prebuilt/linux-arm64/sysroot" -type f -printf '%s %p\n' | sort -n | tail -40 || true

      - name: Compute package metadata
        id: meta
        run: |
          sanitize() {
            echo "$1" | sed -E 's/[^A-Za-z0-9._-]+/-/g; s/^-+//; s/-+$//'
          }

          ts="$(date -u +%Y%m%d-%H%M%S)"
          ndk_label="${{ steps.ndkmeta.outputs.ndk_label }}"
          llvm_label="${{ steps.llvmmeta.outputs.llvm_label }}"

          suffix="linux-arm64"
          [ "${{ inputs.slim_mode }}" = "true" ] && suffix="${suffix}-slim"
          [ "${{ inputs.ultra_slim_mode }}" = "true" ] && suffix="${suffix}-ultraslim"

          if [ -n "${{ inputs.package_name }}" ]; then
            base="${{ inputs.package_name }}"
          else
            base="android-ndk-${ndk_label}-${llvm_label}-${suffix}"
          fi

          base="$(sanitize "$base")"

          if [ -n "${{ inputs.tag_name }}" ]; then
            tag="$(sanitize "${{ inputs.tag_name }}")"
          else
            tag="$(sanitize "ndk-${ndk_label}-${llvm_label}-${suffix}-${ts}")"
          fi

          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Rename package root
        run: |
          cd work/src
          ROOT_NAME="$(find . -mindepth 1 -maxdepth 1 -type d | head -n1 | sed 's#^\./##')"
          FINAL_DIR="${{ steps.meta.outputs.base }}"

          if [ "$ROOT_NAME" != "$FINAL_DIR" ]; then
            mv "$ROOT_NAME" "$FINAL_DIR"
          fi

          echo "FINAL_DIR=$FINAL_DIR" >> "$GITHUB_ENV"

      - name: Resolve compression settings
        id: compression
        run: |
          case "${{ inputs.compression_profile }}" in
            fast)
              echo "mx=5" >> "$GITHUB_OUTPUT"
              echo "mfb=64" >> "$GITHUB_OUTPUT"
              echo "md=64m" >> "$GITHUB_OUTPUT"
              ;;
            balanced)
              echo "mx=7" >> "$GITHUB_OUTPUT"
              echo "mfb=128" >> "$GITHUB_OUTPUT"
              echo "md=128m" >> "$GITHUB_OUTPUT"
              ;;
            aggressive)
              echo "mx=9" >> "$GITHUB_OUTPUT"
              echo "mfb=273" >> "$GITHUB_OUTPUT"
              echo "md=256m" >> "$GITHUB_OUTPUT"
              ;;
            ultra)
              echo "mx=9" >> "$GITHUB_OUTPUT"
              echo "mfb=273" >> "$GITHUB_OUTPUT"
              echo "md=512m" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unknown compression profile"
              exit 1
              ;;
          esac

      - name: Pack ZIP
        if: ${{ inputs.package_format == 'zip' || inputs.package_format == 'both' }}
        run: |
          cd work/src
          zip -r9 "$GITHUB_WORKSPACE/work/out/${FINAL_DIR}.zip" "$FINAL_DIR"
          ls -lh "$GITHUB_WORKSPACE/work/out/${FINAL_DIR}.zip"

      - name: Pack TAR
        if: ${{ inputs.package_format == 'tar.7z' || inputs.package_format == 'both' }}
        run: |
          cd work/src
          bsdtar -cpf "$GITHUB_WORKSPACE/work/out/${FINAL_DIR}.tar" "$FINAL_DIR"
          ls -lh "$GITHUB_WORKSPACE/work/out/${FINAL_DIR}.tar"

      - name: Pack TAR.7Z
        if: ${{ inputs.package_format == 'tar.7z' || inputs.package_format == 'both' }}
        run: |
          TAR_PATH="$GITHUB_WORKSPACE/work/out/${FINAL_DIR}.tar"
          OUT="$GITHUB_WORKSPACE/work/out/${FINAL_DIR}.tar.7z"

          7z a "$OUT" "$TAR_PATH" \
            -t7z \
            -m0=lzma2 \
            -mx=${{ steps.compression.outputs.mx }} \
            -mfb=${{ steps.compression.outputs.mfb }} \
            -md=${{ steps.compression.outputs.md }} \
            -ms=on \
            -mmt=2

          ls -lh "$OUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.base }}
          path: |
            work/out/*.zip
            work/out/*.tar.7z

      - name: Create and push tag
        if: ${{ inputs.create_tag }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "Tag already exists: $TAG"
            exit 1
          fi

          git tag "$TAG"
          git push origin "refs/tags/$TAG"

      - name: Create release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.base }}
          files: |
            work/out/*.zip
            work/out/*.tar.7z
          body: |
            ARM64-hosted Android NDK package

            - Auto channel: `${{ inputs.release_channel }}`
            - Resolved NDK URL: `${{ steps.ndkmeta.outputs.ndk_url }}`
            - NDK label: `${{ steps.ndkmeta.outputs.ndk_label }}`
            - Resolved LLVM URL: `${{ steps.llvmmeta.outputs.llvm_url }}`
            - LLVM label: `${{ steps.llvmmeta.outputs.llvm_label }}`
            - Slim mode: `${{ inputs.slim_mode }}`
            - Ultra slim mode: `${{ inputs.ultra_slim_mode }}`
            - Keep x86 host: `${{ inputs.keep_x86_host }}`
            - Compression profile: `${{ inputs.compression_profile }}`
            - Package format: `${{ inputs.package_format }}`

            Notes:
            - Official NDK sysroot is preserved
            - ARM64 host tree is built from scratch
            - Only selected LLVM tools/resources are copied
            - Duplicate linux-x86_64 host tree can be removed
            - Ultra slim mode prunes non-aarch64 target sysroot content
            - Unix-safe compressed output is emitted as `.tar.7z`
