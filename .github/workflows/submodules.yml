name: Setup / Update Submodules (kernels + managers)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: true

      - name: Configure git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git config --global --add safe.directory '*'

      - name: Remove old stub (once)
        run: |
          git rm -r src || true

      # -------- helper: add if missing --------
      - name: Ensure submodules exist
        shell: bash
        run: |
          set -e

          add_if_missing () {
            local path="$1"
            local url="$2"
            local branch="$3"

            if [ ! -d "$path/.git" ]; then
              if [ -n "$branch" ]; then
                git submodule add --depth=1 -b "$branch" "$url" "$path"
              else
                git submodule add --depth=1 "$url" "$path"
              fi
            else
              echo "exists: $path"
            fi
          }

          # -------- KERNELS --------
          add_if_missing kernel/6.1 https://github.com/ramabondanp/android_kernel_common-6.1.git android14-6.1
          add_if_missing kernel/6.6 https://github.com/ramabondanp/android_kernel_common-6.6.git android15-6.6
          add_if_missing kernel/5.10 https://github.com/MillenniumOSS/android_kernel_common_android12-5.10.git chihiro-rebase
          add_if_missing kernel/4.19 https://github.com/Mayuri-Chan/android_kernel_xiaomi_gale.git cip

          # -------- MANAGERS --------
          add_if_missing manager/kernelsu-main https://github.com/tiann/KernelSU.git ""
          add_if_missing manager/kernelsu-4.19 https://github.com/xxblebleblexx/KernelSU.git ""

          add_if_missing manager/kernelsu-next-dev-susfs https://github.com/pershoot/KernelSU-Next.git dev-susfs
          add_if_missing manager/kernelsu-next-legacy-4.19 https://github.com/KernelSU-Next/KernelSU-Next.git next

          add_if_missing manager/mambo-susfs https://github.com/RapliVx/KernelSU.git susfs-mambo-master
          add_if_missing manager/resukisu-main https://github.com/Kingfinik98/ReSukiSU.git ""
          add_if_missing manager/wild-ksu https://github.com/WildKernels/Wild_KSU.git wild

      # -------- update all existing --------
      - name: Update submodules
        run: |
          set -e
          git submodule sync --recursive
          git submodule update --init --recursive --remote

      - name: Commit and push (if changed)
        run: |
          git add .gitmodules */*/ .git/modules || true
          git commit -m "Sync submodules (create if missing, update if exists)" || echo "No changes"
          git push
