name: Update Submodules

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [update-submodules]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
          submodules: false

      - name: Configure git (fast + stable)
        run: |
          git config --global protocol.version 2
          git config --global core.compression 0
          git config --global http.postBuffer 524288000
          git config --global pack.windowMemory 100m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1

          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Normalize submodules to default branch
        run: |
          git submodule sync --recursive

          git config -f .gitmodules --get-regexp path | while read -r key path; do
            name=$(echo "$key" | sed 's/\.path//')
            url=$(git config -f .gitmodules "$name.url")

            default_branch=$(git ls-remote --symref "$url" HEAD | awk '/^ref:/ {sub("refs/heads/","",$2); print $2}')

            if [ -z "$default_branch" ]; then
              echo "skip $path"
              continue
            fi

            git config -f .gitmodules "$name.branch" "$default_branch"
            echo "$path -> $default_branch"
          done

          git submodule sync --recursive

      - name: Update submodules (targeted + fast + safe)
        run: |
          update() {
            git -c submodule.fetchJobs=1 submodule update \
              --init \
              --remote \
              --depth=1 \
              --filter=blob:none \
              "$1" || echo "skip $1"
          }

          update src/5.10
          update src/6.1
          update src/6.6

          update manager/KernelSU
          update manager/KernelSU-Next
          update manager/ResukiSU
          update manager/Rissu
          update manager/Wild_KSU

      - name: Commit and push if changed
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git add .gitmodules
            git add src manager
            git commit -m "auto: update submodules"
            git push
          fi
