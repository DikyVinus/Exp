name: Setup / Update Submodules (kernels + managers)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: true
          fetch-depth: 1

      - shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git config --global --add safe.directory '*'

      - shell: bash
        run: |
          set -euo pipefail
          git rm -r src || true

      - name: Ensure submodules (fully hardened)
        shell: bash
        run: |
          set -euo pipefail

          ensure_submodule () {
            local path="$1"
            local url="$2"
            local branch="$3"

            local expected_url="$url"
            local expected_branch="$branch"

            local exists="false"
            local current_url=""
            local current_branch=""

            if git config -f .gitmodules --get "submodule.${path}.url" >/dev/null 2>&1; then
              exists="true"
              current_url="$(git config -f .gitmodules --get "submodule.${path}.url" || true)"
              current_branch="$(git config -f .gitmodules --get "submodule.${path}.branch" || true)"
            fi

            if [ "$exists" = "true" ]; then
              if [ "$current_url" != "$expected_url" ] || [ "$current_branch" != "$expected_branch" ]; then
                git submodule deinit -f "$path" || true
                rm -rf ".git/modules/$path"
                rm -rf "$path"
                git rm -r --cached "$path" 2>/dev/null || true
                exists="false"
              fi
            fi

            if [ "$exists" = "false" ]; then
              if [ -n "$branch" ]; then
                git submodule add -b "$branch" "$url" "$path"
                git -C "$path" fetch origin "${branch}" --depth=1
                git -C "$path" checkout "${branch}"
                git config -f .gitmodules "submodule.${path}.branch" "$branch"
              else
                git submodule add --depth=1 "$url" "$path"
              fi
            fi

            if [ -d "$path" ]; then
              if [ -n "$branch" ]; then
                git -C "$path" fetch origin "${branch}" --depth=1 || true
                git -C "$path" checkout "${branch}" || true
              fi
            fi
          }

          ensure_submodule kernel/6.1 https://github.com/ramabondanp/android_kernel_common-6.1.git android14-6.1
          ensure_submodule kernel/6.6 https://github.com/ramabondanp/android_kernel_common-6.6.git android15-6.6
          ensure_submodule kernel/5.10 https://github.com/MillenniumOSS/android_kernel_common_android12-5.10.git chihiro-rebase
          ensure_submodule kernel/4.19 https://github.com/Mayuri-Chan/android_kernel_xiaomi_gale.git cip

          ensure_submodule manager/kernelsu-main https://github.com/tiann/KernelSU.git ""
          ensure_submodule manager/kernelsu-4.19 https://github.com/xxblebleblexx/KernelSU.git ""

          ensure_submodule manager/kernelsu-next-dev-susfs https://github.com/pershoot/KernelSU-Next.git dev-susfs
          ensure_submodule manager/kernelsu-next-legacy-4.19 https://github.com/KernelSU-Next/KernelSU-Next.git next

          ensure_submodule manager/mambo-susfs https://github.com/RapliVx/KernelSU.git susfs-mambo-master
          ensure_submodule manager/resukisu-main https://github.com/Kingfinik98/ReSukiSU.git ""
          ensure_submodule manager/wild-ksu https://github.com/WildKernels/Wild_KSU.git wild

      - shell: bash
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git submodule update --init --recursive --depth=1

      - shell: bash
        run: |
          set -euo pipefail
          git submodule update --remote --recursive || true

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add .gitmodules kernel manager
            git commit -m "Sync submodules (fully hardened)"
            git push
          else
            echo "No changes"
          fi
