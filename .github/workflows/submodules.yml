name: Submodule Sync (Deterministic, Non-Blocking)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1
          persist-credentials: true

      - name: Git config
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git config --global --add safe.directory '*'

      - name: Reset state
        shell: bash
        run: |
          set -euo pipefail
          rm -rf kernel manager src
          git rm -r --cached kernel manager src 2>/dev/null || true

      - name: Ensure submodules (clone-controlled)
        shell: bash
        run: |
          set -euo pipefail

          ensure() {
            local path="$1"
            local url="$2"
            local branch="$3"

            # full purge
            git submodule deinit -f "$path" 2>/dev/null || true
            rm -rf ".git/modules/$path" "$path"
            git rm -r --cached "$path" 2>/dev/null || true

            # controlled clone (no hang possible)
            if [ -n "$branch" ]; then
              timeout 300 git clone --depth=1 --branch "$branch" --single-branch --progress "$url" "$path"
            else
              timeout 300 git clone --depth=1 --progress "$url" "$path"
            fi

            # register as submodule (metadata only)
            git submodule add -f "$url" "$path"
            if [ -n "$branch" ]; then
              git config -f .gitmodules "submodule.${path}.branch" "$branch"
            fi
          }

          ensure kernel/6.1 https://github.com/ramabondanp/android_kernel_common-6.1.git android14-6.1
          ensure kernel/6.6 https://github.com/ramabondanp/android_kernel_common-6.6.git android15-6.6
          ensure kernel/5.10 https://github.com/MillenniumOSS/android_kernel_common_android12-5.10.git chihiro-rebase
          ensure kernel/4.19 https://github.com/Mayuri-Chan/android_kernel_xiaomi_gale.git cip

          ensure manager/kernelsu-main https://github.com/tiann/KernelSU.git ""
          ensure manager/kernelsu-4.19 https://github.com/xxblebleblexx/KernelSU.git ""

          ensure manager/kernelsu-next-dev-susfs https://github.com/pershoot/KernelSU-Next.git dev-susfs
          ensure manager/kernelsu-next-legacy-4.19 https://github.com/KernelSU-Next/KernelSU-Next.git next

          ensure manager/mambo-susfs https://github.com/RapliVx/KernelSU.git susfs-mambo-master
          ensure manager/resukisu-main https://github.com/Kingfinik98/ReSukiSU.git ""
          ensure manager/wild-ksu https://github.com/WildKernels/Wild_KSU.git wild

      - name: Sync metadata
        shell: bash
        run: |
          set -euo pipefail
          git submodule sync --recursive

      - name: Commit
        shell: bash
        run: |
          set -euo pipefail
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add .gitmodules kernel manager
            git commit -m "submodules: deterministic sync (non-blocking)"
            git push
          fi
