name: Update Submodules

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [update-submodules]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
          submodules: false

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Update submodules (shallow + remote)
        run: |
          git submodule sync --recursive
          git -c submodule.fetchJobs=1 submodule update \
            --init \
            --remote \
            --recursive \
            --depth=1 \
            --filter=blob:none

      - name: Commit and push if changed
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git add .
            git commit -m "auto: update submodules"
            git push
          fi
