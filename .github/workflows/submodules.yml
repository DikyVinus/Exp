name: Setup / Update Submodules (kernels + managers)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: true
          fetch-depth: 1

      - run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git config --global --add safe.directory '*'

      - run: |
          git rm -r src || true

      - name: Ensure submodules (hardened)
        shell: bash
        run: |
          set -euo pipefail

          ensure_submodule () {
            local path="$1"
            local url="$2"
            local branch="$3"

            # Case 1: valid submodule
            if git submodule status "$path" >/dev/null 2>&1; then
              echo "valid: $path"
              return
            fi

            # Case 2: broken directory (exists but not submodule)
            if [ -d "$path" ]; then
              echo "fixing broken dir: $path"
              rm -rf "$path"
              git rm -r --cached "$path" 2>/dev/null || true
            fi

            # Add fresh
            echo "adding: $path"
            if [ -n "$branch" ]; then
              git submodule add --depth=1 -b "$branch" "$url" "$path"
            else
              git submodule add --depth=1 "$url" "$path"
            fi
          }

          # -------- KERNELS --------
          ensure_submodule kernel/6.1 https://github.com/ramabondanp/android_kernel_common-6.1.git android14-6.1
          ensure_submodule kernel/6.6 https://github.com/ramabondanp/android_kernel_common-6.6.git android15-6.6
          ensure_submodule kernel/5.10 https://github.com/MillenniumOSS/android_kernel_common_android12-5.10.git chihiro-rebase
          ensure_submodule kernel/4.19 https://github.com/Mayuri-Chan/android_kernel_xiaomi_gale.git cip

          # -------- MANAGERS --------
          ensure_submodule manager/kernelsu-main https://github.com/tiann/KernelSU.git ""
          ensure_submodule manager/kernelsu-4.19 https://github.com/xxblebleblexx/KernelSU.git ""

          ensure_submodule manager/kernelsu-next-dev-susfs https://github.com/pershoot/KernelSU-Next.git dev-susfs
          ensure_submodule manager/kernelsu-next-legacy-4.19 https://github.com/KernelSU-Next/KernelSU-Next.git next

          ensure_submodule manager/mambo-susfs https://github.com/RapliVx/KernelSU.git susfs-mambo-master
          ensure_submodule manager/resukisu-main https://github.com/Kingfinik98/ReSukiSU.git ""
          ensure_submodule manager/wild-ksu https://github.com/WildKernels/Wild_KSU.git wild

      - name: Sync + update (deterministic)
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git submodule update --init --recursive --depth=1

      - name: Optional: lock to remote (controlled)
        run: |
          set -euo pipefail
          git submodule update --remote --recursive || true

      - name: Commit only if changed
        run: |
          set -e
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add .gitmodules kernel manager
            git commit -m "Sync submodules (hardened, self-healing)"
            git push
          else
            echo "No changes"
          fi
