name: Manage Submodules

on:
  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:
    inputs:
      action:
        description: What to do
        required: true
        default: update
        type: choice
        options:
          - update
          - add
          - replace
          - remove
          - move
          - move_group
          - update_group
          - replace_group

      path:
        description: Single submodule path
        required: false
        default: ""

      group:
        description: Folder group (src / kernel / manager / sources)
        required: false
        default: ""

      url:
        description: Repo URL
        required: false
        default: ""

      branch:
        description: Branch
        required: false
        default: ""

      new_path:
        description: New path
        required: false
        default: ""

      new_group:
        description: New group path
        required: false
        default: ""

  repository_dispatch:
    types: [manage-submodules]

permissions:
  contents: write

jobs:
  manage:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          submodules: false

      - name: Git config
        run: |
          git config user.name github-actions
          git config user.email actions@github.com

      - name: Sync
        run: |
          git submodule sync --recursive || true

      - name: Update all
        if: ${{ github.event.inputs.action == 'update' || github.event_name != 'workflow_dispatch' }}
        run: |
          git config -f .gitmodules --get-regexp path | while read a b; do
            git submodule update --init --remote --depth=1 "$b" || true
          done

      - name: Add
        if: ${{ github.event.inputs.action == 'add' }}
        run: |
          if [ -n "${{ github.event.inputs.branch }}" ]; then
            git submodule add -b "${{ github.event.inputs.branch }}" "${{ github.event.inputs.url }}" "${{ github.event.inputs.path }}"
          else
            git submodule add "${{ github.event.inputs.url }}" "${{ github.event.inputs.path }}"
          fi

      - name: Replace
        if: ${{ github.event.inputs.action == 'replace' }}
        run: |
          git submodule deinit -f "${{ github.event.inputs.path }}" || true
          rm -rf ".git/modules/${{ github.event.inputs.path }}"
          git rm -f "${{ github.event.inputs.path }}" || true

          if [ -n "${{ github.event.inputs.branch }}" ]; then
            git submodule add -b "${{ github.event.inputs.branch }}" "${{ github.event.inputs.url }}" "${{ github.event.inputs.path }}"
          else
            git submodule add "${{ github.event.inputs.url }}" "${{ github.event.inputs.path }}"
          fi

      - name: Remove
        if: ${{ github.event.inputs.action == 'remove' }}
        run: |
          git submodule deinit -f "${{ github.event.inputs.path }}" || true
          rm -rf ".git/modules/${{ github.event.inputs.path }}"
          git rm -f "${{ github.event.inputs.path }}" || true

      - name: Move single
        if: ${{ github.event.inputs.action == 'move' }}
        run: |
          old="${{ github.event.inputs.path }}"
          new="${{ github.event.inputs.new_path }}"

          git mv "$old" "$new"

          url=$(git config -f .gitmodules --get submodule.$old.url || true)
          branch=$(git config -f .gitmodules --get submodule.$old.branch || true)

          git config -f .gitmodules --remove-section submodule.$old || true
          git config -f .gitmodules submodule.$new.path "$new"

          if [ -n "$url" ]; then
            git config -f .gitmodules submodule.$new.url "$url"
          fi

          if [ -n "$branch" ]; then
            git config -f .gitmodules submodule.$new.branch "$branch"
          fi

      - name: Move group
        if: ${{ github.event.inputs.action == 'move_group' }}
        run: |
          old="${{ github.event.inputs.group }}"
          new="${{ github.event.inputs.new_group }}"

          git config -f .gitmodules --get-regexp path | while read a b; do
            case "$b" in
              $old/*)
                name="${b#$old/}"
                target="$new/$name"

                git mv "$b" "$target"

                url=$(git config -f .gitmodules --get submodule.$b.url || true)
                branch=$(git config -f .gitmodules --get submodule.$b.branch || true)

                git config -f .gitmodules --remove-section submodule.$b || true
                git config -f .gitmodules submodule.$target.path "$target"

                if [ -n "$url" ]; then
                  git config -f .gitmodules submodule.$target.url "$url"
                fi

                if [ -n "$branch" ]; then
                  git config -f .gitmodules submodule.$target.branch "$branch"
                fi
              ;;
            esac
          done

      - name: Update group
        if: ${{ github.event.inputs.action == 'update_group' }}
        run: |
          grp="${{ github.event.inputs.group }}"

          git config -f .gitmodules --get-regexp path | while read a b; do
            case "$b" in
              $grp/*)
                git submodule update --init --remote --depth=1 "$b" || true
              ;;
            esac
          done

      - name: Replace group branch
        if: ${{ github.event.inputs.action == 'replace_group' }}
        run: |
          grp="${{ github.event.inputs.group }}"
          br="${{ github.event.inputs.branch }}"

          git config -f .gitmodules --get-regexp path | while read a b; do
            case "$b" in
              $grp/*)
                git config -f .gitmodules submodule.$b.branch "$br"
                git submodule update --init --remote --depth=1 "$b" || true
              ;;
            esac
          done

      - name: Commit
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add .gitmodules . || true
            git commit -m "auto: manage submodules"
            git push
          fi
