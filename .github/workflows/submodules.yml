name: Update Submodules

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [update-submodules]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
          submodules: false

      - name: Configure git
        run: |
          git config --global protocol.version 2
          git config --global core.compression 0
          git config user.name "github-actions"
          git config user.email "actions@github.com"
      - name: Sync submodules
        run: |
          git submodule sync --recursive
      - name: Update submodules (respect .gitmodules only)
        run: |
          git config -f .gitmodules --get-regexp path | while read -r key path; do
            echo "updating $path"
            git -c submodule.fetchJobs=1 submodule update \
              --init \
              --remote \
              --depth=1 \
              --filter=blob:none \
              "$path" || echo "skip $path"
          done
      - name: Commit and push if changed
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git add .gitmodules
            git add .
            git commit -m "auto: update submodules"
            git push
          fi
