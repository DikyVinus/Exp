steps:
      - name: Checkout Root (No Submodules)
        uses: actions/checkout@v4
        with:
          # We don't pull submodules here to save time and space
          submodules: false
          fetch-depth: 0 

      - name: Initialize Specific Submodule
        run: |
          # Only initialize the specific folder passed in the inputs
          SUBMODULE_PATH="repo/src/${{ inputs.version }}"
          git submodule update --init --depth 1 "$SUBMODULE_PATH"

      - name: Generate Patches
        run: |
          SUBMODULE_PATH="repo/src/${{ inputs.version }}"
          cd "$SUBMODULE_PATH"
          
          # Force fetch the history of the submodule so we can compare commits
          # (Initial shallow clone doesn't have the history needed for format-patch)
          git fetch --unshallow || true
          
          git remote add android https://android.googlesource.com/kernel/common.git
          git fetch android ${{ inputs.base_branch }} --quiet
          
          PATCH_DIR="${{ github.workspace }}/extracted_patches"
          mkdir -p "$PATCH_DIR"
          
          git format-patch android/${{ inputs.base_branch }}..HEAD -o "$PATCH_DIR"
