name: Extract payload.bin (skip >2GB artifacts)

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: "Google Drive FILE_ID"
        required: true
        type: string

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space (cleanup)
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip wget tar
          pip3 install --no-cache-dir gdown

      - name: Download payload.bin
        run: |
          gdown ${{ github.event.inputs.file_id }} -O payload.bin
          ls -lh payload.bin
          file payload.bin

      - name: Install payload-dumper-go
        run: |
          wget https://github.com/ssut/payload-dumper-go/releases/download/1.3.0/payload-dumper-go_1.3.0_linux_amd64.tar.gz
          tar -xzf payload-dumper-go_1.3.0_linux_amd64.tar.gz
          chmod +x payload-dumper-go

      - name: Extract payload.bin
        run: |
          mkdir -p output
          ./payload-dumper-go payload.bin --out output

      - name: Verify extraction (critical)
        run: |
          echo "Listing output:"
          ls -lah output || true
          echo "Disk usage:"
          du -sh output || true

      - name: Remove payload.bin (free space)
        run: |
          rm -f payload.bin
          df -h

      - name: Remove files larger than 2GB
        run: |
          find output -type f -size +2G -print -delete

      - name: Verify remaining files
        run: |
          echo "Remaining files:"
          ls -lah output || true

      - name: Upload artifacts (<2GB only)
        uses: actions/upload-artifact@v4
        with:
          name: extracted-images
          path: output/*
          if-no-files-found: error
