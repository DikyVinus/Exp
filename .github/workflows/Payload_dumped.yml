name: Extract payload.bin from OTA zip (skip >2GB artifacts)

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "Direct URL to OTA zip (must be curlable)"
        required: true
        type: string

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip tar xxd

      - name: Download OTA zip
        run: |
          wget -O ota.zip "${{ github.event.inputs.file_url }}"
          ls -lh ota.zip

      - name: Extract payload.bin from zip
        run: |
          unzip -j ota.zip payload.bin -d .
          ls -lh payload.bin

      - name: Validate payload.bin
        run: |
          SIZE=$(stat -c%s payload.bin)
          if [ "$SIZE" -lt 100000000 ]; then
            echo "payload.bin too small"
            exit 1
          fi

          MAGIC=$(head -c 4 payload.bin | xxd -p)
          if [ "$MAGIC" != "43724155" ]; then
            echo "Invalid payload (missing CrAU)"
            exit 1
          fi

      - name: Install payload-dumper-go
        run: |
          wget https://github.com/ssut/payload-dumper-go/releases/download/1.3.0/payload-dumper-go_1.3.0_linux_amd64.tar.gz
          tar -xzf payload-dumper-go_1.3.0_linux_amd64.tar.gz
          chmod +x payload-dumper-go
          
      - name: Full extraction
        run: |
          set -euo pipefail
          mkdir -p output
          ./payload-dumper-go payload.bin --out output

      - name: Validate extracted files
        run: |
          COUNT=$(find output -type f -name "*.img" | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "No images extracted"
            exit 1
          fi

      - name: Cleanup payload + zip
        run: |
          rm -f payload.bin ota.zip
          df -h

      - name: Remove files larger than 2GB
        run: |
          find output -type f -size +2G -print -delete

      - name: Ensure files remain
        run: |
          COUNT=$(find output -type f | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "All files removed (>2GB)"
            exit 1
          fi

      - name: Upload artifacts (<2GB only)
        uses: actions/upload-artifact@v4
        with:
          name: extracted-images
          path: output/**
          if-no-files-found: error
